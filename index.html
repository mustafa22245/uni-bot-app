<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الحلة الجامعي</title>
    <style>
        :root { --main: #0088cc; --bg: #f8fafd; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; direction: rtl; }
        .header { background: linear-gradient(135deg, #0088cc, #005588); color: white; padding: 30px; text-align: center; border-radius: 0 0 30px 30px; }
        .container { padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 25px 15px; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-weight: bold; transition: 0.2s; }
        .card:active { transform: scale(0.9); }
        .results-panel { display: none; background: white; border-radius: 20px; padding: 20px; margin-top: 10px; min-height: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .back-btn { background: #eee; border: none; padding: 12px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; width: 100%; font-weight: bold; }
        .list-item { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 5px solid var(--main); display: flex; justify-content: space-between; align-items: center; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">🎓 تطبيق الحلة الجامعي</h2>
        <p style="margin:5px; opacity:0.8">الإصدار المستقر والنهائي ✅</p>
    </div>

    <div class="container">
        <div id="mainGrid" class="grid">
            <div class="card" onclick="openSection('files')">📁<br>الملازم</div>
            <div class="card" onclick="openSection('tr')">✅<br>المترجم</div>
            <div class="card" onclick="openSection('tips')">📢<br>نصيحة اليوم</div>
            <div class="card" onclick="openSection('exams')">⏳<br>الامتحانات</div>
        </div>

        <div id="resultsPanel" class="results-panel">
            <button id="backBtn" class="back-btn" onclick="goHome()">🔙 العودة للرئيسية</button>
            <div id="dynamicContent"></div>
        </div>
    </div>

    <script>
        // الإعدادات الأساسية
        const PROXY = "https://api.allorigins.win/get?url=";
        const API_URL = "http://fi3.bot-hosting.net:20179";

        // دالة جلب البيانات مع فك التشفير
        async function getData(path) {
            const fullUrl = API_URL + path;
            const response = await fetch(PROXY + encodeURIComponent(fullUrl));
            if (!response.ok) throw new Error("Network error");
            const json = await response.json();
            // تحويل النص القادم من البروكسي إلى كائن جافا سكريبت
            return JSON.parse(json.contents);
        }

        async function openSection(id) {
            const grid = document.getElementById('mainGrid');
            const panel = document.getElementById('resultsPanel');
            const content = document.getElementById('dynamicContent');

            grid.style.display = "none";
            panel.style.display = "block";
            content.innerHTML = "<p style='text-align:center'>جاري التحميل... 🔄</p>";

            try {
                if (id === 'tips') {
                    const data = await getData('/get_tip');
                    content.innerHTML = `<div style="padding:40px; text-align:center; font-size:22px; line-height:1.6">🌟 <br><br> ${data.tip}</div>`;
                } 
                else if (id === 'files') {
                    const cats = await getData('/get_categories');
                    content.innerHTML = "<h3>📂 الأقسام الجامعية:</h3>";
                    cats.forEach(c => {
                        content.innerHTML += `<div class="card" style="width:90%; margin-bottom:10px" onclick="loadFiles('${c}')">${c}</div>`;
                    });
                }
                else {
                    content.innerHTML = "<h3>قريباً...</h3><p>هذا القسم سيتم تفعيله لاحقاً.</p>";
                }
            } catch (err) {
                console.error(err);
                content.innerHTML = "<p style='color:red; text-align:center'>❌ فشل الاتصال. تأكد من تشغيل الاستضافة.</p>";
            }
        }

        async function loadFiles(catName) {
            const content = document.getElementById('dynamicContent');
            const backBtn = document.getElementById('backBtn');
            content.innerHTML = "جاري جلب الملفات... 📄";
            
            try {
                const files = await getData('/get_files/' + encodeURIComponent(catName));
                let html = `<h3>📄 ملفات ${catName}:</h3>`;
                for(let name in files) {
                    html += `<div class="list-item" onclick="viewFile('${files[name]}', '${name}')">
                                <span>${name}</span> 
                                <span style="color:var(--main)">👁️ عرض</span>
                             </div>`;
                }
                content.innerHTML = html;
                backBtn.onclick = () => openSection('files');
            } catch (e) {
                content.innerHTML = "خطأ في تحميل الملفات.";
            }
        }

        function viewFile(url, name) {
            const content = document.getElementById('dynamicContent');
            content.innerHTML = `<div style="margin-bottom:10px; font-weight:bold">👀 عرض: ${name}</div>
                                 <iframe src="${url}"></iframe>`;
            document.getElementById('backBtn').onclick = () => openSection('files');
        }

        function goHome() {
            document.getElementById('mainGrid').style.display = "grid";
            document.getElementById('resultsPanel').style.display = "none";
            document.getElementById('backBtn').onclick = goHome;
        }
        <div style="text-align:center; padding:20px;">
    <button onclick="openAdmin()" style="background:none; border:none; color:#ccc; font-size:10px;">Control Panel</button>
</div>

<div id="adminPanel" class="results-panel" style="display:none; background:#2c3e50; color:white;">
    <button class="back-btn" onclick="goHome()">❌ إغلاق اللوحة</button>
    <h3>🛠️ لوحة تحكم الإدارة</h3>
    
    <label>إضافة نصيحة جديدة:</label>
    <input type="text" id="newTip" style="width:80%; padding:10px; border-radius:10px;">
    <button onclick="addTip()" style="padding:10px;">➕</button>
    
    <hr>
    
    <label>إضافة قسم جديد:</label>
    <input type="text" id="newCat" placeholder="اسم القسم" style="width:80%; padding:10px; border-radius:10px; margin-bottom:5px;">
    <br>
    <input type="text" id="fileName" placeholder="اسم الملف" style="width:40%; padding:10px; border-radius:10px;">
    <input type="text" id="fileUrl" placeholder="رابط الملف" style="width:40%; padding:10px; border-radius:10px;">
    <button onclick="addEntry()" style="width:100%; margin-top:10px; background:#27ae60; color:white; border:none; padding:10px; border-radius:10px;">حفظ وإضافة</button>
</div>

<script>
    // بيانات مؤقتة للوحة التحكم
    let currentDB = { categories: {}, tips: [] };

    async function openAdmin() {
        document.getElementById('mainGrid').style.display = "none";
        document.getElementById('adminPanel').style.display = "block";
        // جلب البيانات الحالية لتعديلها
        const json = await fetch(PROXY + encodeURIComponent(API_URL + "/get_tip")); // مجرد وسيلة لجلب الـ DB كاملاً إذا أعددت ذلك
    }

    async function saveToServer() {
        const response = await fetch(API_URL + "/update_db", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(currentDB)
        });
        const res = await response.json();
        alert(res.message);
    }

    function addTip() {
        const tip = document.getElementById('newTip').value;
        if(tip) {
            currentDB.tips.push(tip);
            alert("تمت إضافة النصيحة محلياً، اضغط حفظ نهائي");
        }
    }
    // يمكننا تطوير هذه الوظائف لتشمل مسح وإضافة ملفات بضغطة زر
</script>

    </script>
</body>
</html>
