<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الحلة الجامعي</title>
    <style>
        :root { --main: #0088cc; --bg: #f8fafd; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; direction: rtl; }
        .header { background: linear-gradient(135deg, #0088cc, #005588); color: white; padding: 30px; text-align: center; border-radius: 0 0 30px 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-weight: bold; }
        .results-panel { display: none; background: white; border-radius: 20px; padding: 20px; margin: 10px; min-height: 250px; }
        .back-btn { background: #eee; border: none; padding: 12px; width: 100%; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h2>🎓 تطبيق الحلة الجامعي</h2></div>
    <div id="mainGrid" class="grid">
        <div class="card" onclick="openSection('tips')">📢<br>نصيحة اليوم</div>
        <div class="card" onclick="openSection('files')">📁<br>الملازم</div>
        <div class="card" onclick="openSection('tr')">✅<br>المترجم</div>
        <div class="card" onclick="openSection('exams')">⏳<br>الامتحانات</div>
    </div>
    <div id="resultsPanel" class="results-panel">
        <button class="back-btn" onclick="goHome()">🔙 العودة للرئيسية</button>
        <div id="dynamicContent" style="text-align: center; padding-top: 20px;"></div>
    </div>

    <script>
        // ملاحظة: استخدمنا http لأن استضافتك لا تدعم التشفير حالياً
        const API_URL = "http://fi3.bot-hosting.net:20179";

        async function openSection(id) {
            document.getElementById('mainGrid').style.display = "none";
            document.getElementById('resultsPanel').style.display = "block";
            const content = document.getElementById('dynamicContent');
            content.innerHTML = "جاري الاتصال بالسيرفر... 🔄";

            try {
                if (id === 'tips') {
                    const res = await fetch(`${API_URL}/get_tip`);
                    const data = await res.json();
                    content.innerHTML = `<h2 style="color:var(--main)">🌟</h2><h3>${data.tip}</h3>`;
                } else {
                    content.innerHTML = "هذا القسم سيتم تفعيله بعد رفع بياناتك.";
                }
            } catch (err) {
                content.innerHTML = "<p style='color:red'>❌ فشل الاتصال. تأكد من عمل (سماح بالمحتوى غير الآمن) في إعدادات المتصفح.</p>";
            }
        }

        function goHome() {
            document.getElementById('mainGrid').style.display = "grid";
            document.getElementById('resultsPanel').style.display = "none";
        }
    </script>
</body>
</html>
