<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المساعد الأكاديمي الذكي 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --header-grad: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%);
            --border: #E2E8F0; --gray: #94A3B8;
        }

        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8;
            --header-grad: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
        }

        body { 
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden;
        }

        /* الهيدر الاحترافي */
        .app-header { background: var(--header-grad); padding: 50px 20px 30px; text-align: center; position: relative; }
        .app-logo { 
            width: 100px; height: 100px; background: white; border-radius: 50%; 
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;
        }
        .app-logo img { width: 100%; height: 100%; object-fit: cover; }

        /* الأقسام والمواد */
        .page { display: none; padding: 20px; padding-bottom: 100px; animation: fadeIn 0.4s; }
        .page.active { display: block; }

        .section-title { color: var(--primary); border-right: 4px solid var(--primary); padding-right: 10px; margin: 20px 0 10px; }

        /* بطاقة الملزمة */
        .file-card { 
            background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; 
            display: flex; align-items: center; justify-content: space-between; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid var(--border);
        }
        .file-info { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .file-icon { font-size: 24px; color: #ef4444; }
        
        .download-btn { 
            background: #2ecc71; color: white; border: none; padding: 8px 12px; 
            border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold;
            display: flex; align-items: center; gap: 5px;
        }

        /* الشريط السفلي */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .nav-item { text-align: center; color: var(--gray); font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); font-weight: 700; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="app-header">
            <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
            <h2>المساعد الأكاديمي</h2>
            <p>جميع ملازمك في مكان واحد وبأقل مساحة ☁️</p>
        </div>

        <div id="content-area">
            <h3 class="section-title">الأقسام المتاحة</h3>
            <div id="subjects-container"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i>الرئيسية</div>
        <div class="nav-item"><i class="fas fa-download"></i>المحفوظات</div>
        <div class="nav-item"><i class="fas fa-cog"></i>الإعدادات</div>
    </div>

    <script>
        // --- هنا الجزء الذي تتحكم به أنت (البيانات) ---
        const myAppData = {
            subjects: [
                {
                    name: "فيزياء هندسية",
                    files: [
                        { name: "المحاضرة 1: الميكانيك", url: "رابط_المعاينة_هنا", downloadUrl: "رابط_التحميل_المباشر_هنا" },
                        { name: "المحاضرة 2: الضوء", url: "رابط_المعاينة_هنا", downloadUrl: "رابط_التحميل_المباشر_هنا" }
                    ]
                },
                {
                    name: "رياضيات 1",
                    files: [
                        { name: "التفاضل والتكامل", url: "رابط_المعاينة_هنا", downloadUrl: "رابط_التحميل_المباشر_هنا" }
                    ]
                }
            ]
        };

        function renderApp() {
            const container = document.getElementById('subjects-container');
            container.innerHTML = "";

            myAppData.subjects.forEach(sub => {
                let filesHtml = "";
                sub.files.forEach(file => {
                    filesHtml += `
                        <div class="file-card">
                            <div class="file-info" onclick="window.open('${file.url}', '_blank')">
                                <i class="fas fa-file-pdf file-icon"></i>
                                <div>
                                    <b>${file.name}</b>
                                    <p style="margin:0; font-size:10px; color:gray;">اضغط للمعاينة السريعة</p>
                                </div>
                            </div>
                            <button class="download-btn" onclick="window.location.href='${file.downloadUrl}'">
                                <i class="fas fa-download"></i> تنزيل
                            </button>
                        </div>
                    `;
                });

                container.innerHTML += `
                    <div>
                        <h4 class="section-title">${sub.name}</h4>
                        ${filesHtml}
                    </div>
                `;
            });
        }

        // تشغيل التطبيق
        renderApp();
    </script>
</body>
</html>
            <input type="text" id="admAppTitle" class="admin-input" placeholder="اسم التطبيق">
            <input type="text" id="admAppLogo" class="admin-input" placeholder="رابط صورة اللوغو">
            <button class="admin-action" onclick="updateAppInfo()">تحديث الهوية</button>
        </div>

        <div class="admin-section">
            <h4>📂 إدارة المحتوى السحابي</h4>
            <input type="text" id="admSubName" class="admin-input" placeholder="اسم القسم (مثلاً: الفيزياء)">
            <input type="text" id="admFileName" class="admin-input" placeholder="اسم الملزمة">
            <input type="text" id="admFileUrl" class="admin-input" placeholder="رابط الملف (Preview)">
            <button class="admin-action" onclick="addFullContent()" style="background:#2ecc71;">حفظ في السحابة</button>
            <hr style="opacity:0.2; margin:15px 0;">
            <div id="admSubjectsList"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="nav('home')"><i class="fas fa-home"></i>الرئيسية</div>
        <div class="nav-btn" onclick="nav('favorites')"><i class="fas fa-heart"></i>المفضلة</div>
        <div class="nav-btn" onclick="nav('recent')"><i class="fas fa-history"></i>المحفوظات</div>
        <div class="nav-btn" onclick="nav('more')"><i class="fas fa-th-large"></i>المزيد</div>
    </div>

    <script>
        const DB_URL = "https://hillah-app-default-rtdb.firebaseio.com/.json";
        const PASS = "2004@@##mklL";

        let appData = { subjects: [], config: { title: "المساعد الأكاديمي", logo: "https://i.ibb.co/VvzKXY7/bot-avatar.png" } };

        async function load() {
            try {
                const r = await fetch(DB_URL + "?t=" + Date.now());
                const d = await r.json();
                if(d) appData = d;
                if(!appData.subjects) appData.subjects = [];
                syncUI();
            } catch(e) { console.log("Error loading"); }
        }

        function syncUI() {
            document.getElementById('appTitleText').innerText = appData.config.title;
            document.getElementById('appLogoImg').src = appData.config.logo;
            document.getElementById('sideLogo').src = appData.config.logo;
            renderSubjects();
            renderAdminSubjects();
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById(p + '-page').classList.add('active');
            toggleSide(true);
        }

        function accessAdmin() {
            if(prompt("أدخل الرمز السري:") === PASS) document.getElementById('admin-page').style.display = "block";
        }

        function closeAdmin() { document.getElementById('admin-page').style.display = "none"; }

        // إضافة مادة وقسم
        async function addFullContent() {
            const sub = document.getElementById('admSubName').value;
            const file = document.getElementById('admFileName').value;
            const url = document.getElementById('admFileUrl').value;

            if(!sub || !file || !url) return alert("امسح الحقول أولاً!");

            if(!appData.subjects) appData.subjects = [];
            let target = appData.subjects.find(s => s.name === sub);
            if(!target) {
                target = { name: sub, files: [] };
                appData.subjects.push(target);
            }
            if(!target.files) target.files = [];
            target.files.push({ name: file, url: url });
            
            await save();
            alert("تم الحفظ بنجاح!");
            document.getElementById('admFileName').value = "";
            document.getElementById('admFileUrl').value = "";
        }

        function renderAdminSubjects() {
            const list = document.getElementById('admSubjectsList');
            list.innerHTML = "<h5>الأقسام الحالية:</h5>";
            (appData.subjects || []).forEach((s, i) => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; background:#fff; margin-top:5px; border-radius:8px;">
                    <span>${s.name}</span>
                    <button onclick="delSub(${i})" style="color:red; border:none; background:none;">حذف</button>
                </div>`;
            });
        }

        async function updateAppInfo() {
            appData.config.title = document.getElementById('admAppTitle').value || appData.config.title;
            appData.config.logo = document.getElementById('admAppLogo').value || appData.config.logo;
            await save();
            alert("تم تحديث الهوية!");
        }

        async function delSub(i) {
            if(confirm("حذف القسم؟")) {
                appData.subjects.splice(i, 1);
                await save();
            }
        }

        async function save() {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(appData) });
            load();
        }

        function renderSubjects() {
            const list = document.getElementById('subjectsList');
            list.innerHTML = "";
            (appData.subjects || []).forEach(s => {
                let files = "";
                (s.files || []).forEach(f => {
                    files += `<div style="background:#fff; padding:15px; border-radius:12px; margin-top:10px; display:flex; justify-content:space-between;" onclick="window.open('${f.url}','_blank')">
                        <b>${f.name}</b> <i class="fas fa-file-pdf" style="color:red;"></i>
                    </div>`;
                });
                list.innerHTML += `<div style="margin-top:20px;"><h4>📂 ${s.name}</h4>${files}</div>`;
            });
        }

        function toggleSide(closeOnly = false) {
            const s = document.getElementById('sidebar');
            const o = document.getElementById('overlay');
            if(closeOnly) { s.classList.remove('active'); o.style.display = "none"; return; }
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? "block" : "none";
        }

        function toggleDark() { document.body.classList.toggle('dark'); }

        load();
    </script>
</body>
</html>
