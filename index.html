<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المساعد الأكاديمي v25 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --header-grad: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%);
            --border: #E2E8F0; --gray: #94A3B8;
        }
        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8; --border: #334155;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }

        /* الشاشات */
        .page { display: none; min-height: 100vh; animation: fadeIn 0.4s ease; box-sizing: border-box; padding: 20px 20px 120px; }
        .page.active { display: block; }

        /* الهيدر */
        .app-header { background: var(--header-grad); padding: 50px 20px 30px; text-align: center; position: relative; }
        .menu-toggle { position: absolute; right: 20px; top: 25px; font-size: 24px; cursor: pointer; }

        /* القائمة الجانبية */
        .sidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 310px; height: 100%; background: var(--card); z-index: 2000; transition: 0.4s; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .sidebar.active { right: 0; }

        /* الشات */
        .chat-view { height: 65vh; background: var(--card); border-radius: 25px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        #chat-stream, #p-chat-stream { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrap { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .msg-wrap.me { align-self: flex-start; }
        .msg-wrap.other { align-self: flex-end; flex-direction: row-reverse; }
        .msg-txt { padding: 10px 14px; border-radius: 18px; font-size: 13px; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .me .msg-txt { background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .other .msg-txt { background: #E2E8F0; color: #333; border-bottom-left-radius: 2px; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }

        /* الأزرار والشريط السفلي */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-link { text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; }
        .nav-link.active { color: var(--primary); font-weight: 700; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* بطاقة الصديق */
        .friend-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
        
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(4px); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body id="appBody">

    <div id="onboarding" style="display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; background: white; position: fixed; inset: 0; z-index: 9999;">
        <h2>إنشاء حسابك 🎓</h2>
        <input type="text" id="r-user" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;" placeholder="اسم المستخدم">
        <input type="text" id="r-name" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;" placeholder="الاسم الكامل">
        <button onclick="register()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">دخول 🚀</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="sidebar">
        <div style="text-align:center; border-bottom:1px solid #eee; padding-bottom:20px; margin-bottom:20px;">
            <img id="side-pfp" src="https://i.ibb.co/VvzKXY7/bot-avatar.png" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary);">
            <h3 id="side-name" style="margin: 10px 0 0;">مصطفى</h3>
        </div>
        <div onclick="nav('notifications')" style="padding:15px; cursor:pointer;"><i class="fas fa-bell"></i> الإشعارات (الطلبات)</div>
        <div onclick="toggleDark()" style="padding:15px; cursor:pointer;"><i class="fas fa-moon"></i> الوضع الليلي</div>
        <div onclick="localStorage.clear(); location.reload();" style="padding:15px; color:red; cursor:pointer;"><i class="fas fa-power-off"></i> تسجيل الخروج</div>
    </div>

    <div id="home-page" class="page active" style="padding:0;">
        <div class="app-header">
            <i class="fas fa-bars menu-toggle" onclick="toggleSidebar()"></i>
            <h2>المساعد الأكاديمي</h2>
            <p id="hi-user">أهلاً بك</p>
        </div>
        <div style="padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="friend-card" onclick="nav('chat')" style="flex-direction:column; text-align:center; padding:25px;">
                <i class="fas fa-comments" style="font-size:30px; color:#a855f7;"></i><br><b>شات عام</b>
            </div>
            <div class="friend-card" onclick="nav('friends')" style="flex-direction:column; text-align:center; padding:25px;">
                <i class="fas fa-user-friends" style="font-size:30px; color:#4D95FF;"></i><br><b>أصدقائي</b>
            </div>
        </div>
    </div>

    <div id="friends-page" class="page">
        <h2 style="margin-bottom:15px;">👥 قائمة أصدقائي</h2>
        <div id="friends-list-box"></div>
    </div>

    <div id="notifications-page" class="page">
        <h2>🔔 طلبات الصداقة</h2>
        <div id="requests-box"></div>
    </div>

    <div id="p-chat-page" class="page">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:15px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fas fa-arrow-right" onclick="nav('friends')" style="font-size:20px; cursor:pointer;"></i>
                <b id="p-chat-name">الاسم</b>
            </div>
            <i class="fas fa-cog" onclick="alert('إعدادات المحادثة قريباً')" style="cursor:pointer;"></i>
        </div>
        <div class="chat-view">
            <div id="p-chat-stream"></div>
            <div style="display:flex; padding:10px; background:#f1f5f9; gap:8px;">
                <label for="img-up" style="background:#ddd; padding:10px; border-radius:10px; cursor:pointer;"><i class="fas fa-image"></i></label>
                <input type="file" id="img-up" style="display:none" accept="image/*" onchange="sendImage(this)">
                <input type="text" id="p-chat-in" style="flex:1; padding:10px; border-radius:10px; border:none;" placeholder="رسالة خاصة...">
                <button onclick="sendPrivate()" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="chat-page" class="page">
        <h2>💬 الشات العام</h2>
        <div class="chat-view">
            <div id="chat-stream"></div>
            <div style="display:flex; padding:10px; background:#f1f5f9; gap:8px;">
                <input type="text" id="chat-in" style="flex:1; padding:10px; border-radius:10px; border:none;" placeholder="اكتب للجميع...">
                <button onclick="sendGlobal()" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="social-page" class="page">
        <h2>🔍 بحث عن زملاء</h2>
        <input type="text" id="s-input" style="width:100%; padding:15px; border-radius:15px; border:1px solid #ddd;" placeholder="ادخل اليوزر..." oninput="searchUsers()">
        <div id="s-results" style="margin-top:20px;"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-link active" onclick="nav('home')"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-link" onclick="nav('chat')"><i class="fas fa-comment-dots"></i><span>شات عام</span></div>
        <div class="nav-link" onclick="nav('friends')"><i class="fas fa-user-friends"></i><span>أصدقائي</span></div>
        <div class="nav-link" onclick="nav('social')"><i class="fas fa-search"></i><span>بحث</span></div>
    </div>

    <script>
        const FB = "https://mmmmmm7-bc8e8-default-rtdb.firebaseio.com/";
        let me = JSON.parse(localStorage.getItem('userProfile'));
        let activeRoom = null;
        let lastGCount = 0;
        let lastPCount = 0;

        window.onload = () => {
            if(!me) document.getElementById('onboarding').style.display = 'flex';
            else { 
                init(); 
                setInterval(syncGlobal, 4000); 
                setInterval(checkRequests, 6000);
                setInterval(syncPrivate, 3000);
            }
        };

        async function register() {
            const u = document.getElementById('r-user').value.toLowerCase().trim();
            const n = document.getElementById('r-name').value.trim();
            if(u && n) {
                me = { id: Date.now(), username: u, name: n, pfp: 'https://i.ibb.co/VvzKXY7/bot-avatar.png' };
                localStorage.setItem('userProfile', JSON.stringify(me));
                await fetch(FB + "users/" + me.id + ".json", { method: 'PUT', body: JSON.stringify(me) });
                location.reload();
            }
        }

        function init() {
            document.getElementById('hi-user').innerText = "مرحباً يا " + me.name;
            document.getElementById('side-name').innerText = me.name;
            loadFriends();
        }

        // --- نظام الأصدقاء والطلبات ---
        async function loadFriends() {
            const res = await fetch(FB + "friends/" + me.id + ".json");
            const data = await res.json();
            const box = document.getElementById('friends-list-box');
            box.innerHTML = "";
            if(!data) { box.innerHTML = "<p style='text-align:center; color:gray;'>ليس لديك أصدقاء بعد.</p>"; return; }
            Object.entries(data).forEach(([id, f]) => {
                box.innerHTML += `
                    <div class="friend-card">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${f.pfp || 'https://i.ibb.co/VvzKXY7/bot-avatar.png'}" style="width:40px; height:40px; border-radius:50%;">
                            <b>${f.name}</b>
                        </div>
                        <button onclick="openChat('${id}', '${f.name}')" style="background:var(--primary); color:white; border:none; padding:8px 12px; border-radius:10px;">مراسلة</button>
                    </div>`;
            });
        }

        async function checkRequests() {
            const res = await fetch(FB + "requests/" + me.id + ".json");
            const data = await res.json();
            const box = document.getElementById('requests-box');
            if(!data) { box.innerHTML = "<p style='text-align:center;'>لا توجد طلبات.</p>"; return; }
            box.innerHTML = "";
            Object.entries(data).forEach(([id, r]) => {
                box.innerHTML += `<div class="friend-card"><b>${r.name}</b>
                    <button onclick="accept('${id}', '${r.name}')" style="background:#2ecc71; color:white; border:none; padding:5px 15px; border-radius:8px;">قبول</button>
                </div>`;
            });
        }

        async function accept(id, name) {
            // إضافة متبادلة
            await fetch(FB + `friends/${me.id}/${id}.json`, { method: 'PUT', body: JSON.stringify({name: name}) });
            await fetch(FB + `friends/${id}/${me.id}.json`, { method: 'PUT', body: JSON.stringify({name: me.name}) });
            await fetch(FB + `requests/${me.id}/${id}.json`, { method: 'DELETE' });
            alert("تمت الإضافة!"); loadFriends(); checkRequests();
        }

        // --- نظام الشات الخاص والصور ---
        function openChat(friendId, friendName) {
            // إنشاء معرف غرفة فريد: الأصغر_الأكبر
            const ids = [me.id, friendId].sort();
            activeRoom = `${ids[0]}_${ids[1]}`;
            document.getElementById('p-chat-name').innerText = friendName;
            document.getElementById('p-chat-stream').innerHTML = "";
            lastPCount = 0;
            nav('p-chat');
            syncPrivate();
        }

        async function sendPrivate() {
            const input = document.getElementById('p-chat-in');
            if(!input.value.trim() || !activeRoom) return;
            const msg = { uid: me.id, name: me.name, text: input.value, time: Date.now() };
            input.value = "";
            await fetch(FB + `private_chats/${activeRoom}.json`, { method: 'POST', body: JSON.stringify(msg) });
            syncPrivate();
        }

        function sendImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const msg = { uid: me.id, name: me.name, image: e.target.result, time: Date.now() };
                    await fetch(FB + `private_chats/${activeRoom}.json`, { method: 'POST', body: JSON.stringify(msg) });
                    syncPrivate();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function syncPrivate() {
            if(!activeRoom || document.getElementById('p-chat-page').style.display === 'none') return;
            try {
                const res = await fetch(FB + `private_chats/${activeRoom}.json`);
                const data = await res.json();
                if(!data) return;
                const entries = Object.entries(data).sort((a,b)=>a[1].time-b[1].time);
                if(entries.length === lastPCount) return;
                const stream = document.getElementById('p-chat-stream');
                entries.slice(lastPCount).forEach(([id, m]) => {
                    const type = m.uid == me.id ? 'me' : 'other';
                    const content = m.image ? `<img src="${m.image}" class="chat-img" onclick="window.open(this.src)">` : m.text;
                    stream.innerHTML += `<div class="msg-wrap ${type}"><div class="msg-txt">${content}</div></div>`;
                });
                stream.scrollTop = stream.scrollHeight;
                lastPCount = entries.length;
            } catch(e){}
        }

        // --- الشات العام والبحث ---
        async function sendGlobal() {
            const input = document.getElementById('chat-in');
            if(!input.value.trim()) return;
            const msg = { uid: me.id, name: me.name, text: input.value, time: Date.now() };
            input.value = "";
            await fetch(FB + "chat.json", { method: 'POST', body: JSON.stringify(msg) });
            syncGlobal();
        }

        async function syncGlobal() {
            if(document.getElementById('chat-page').style.display === 'none') return;
            const res = await fetch(FB + "chat.json");
            const data = await res.json();
            if(!data) return;
            const entries = Object.entries(data).sort((a,b)=>a[1].time-b[1].time);
            if(entries.length === lastGCount) return;
            const stream = document.getElementById('chat-stream');
            entries.slice(lastGCount).forEach(([id, m]) => {
                const type = m.uid == me.id ? 'me' : 'other';
                stream.innerHTML += `<div class="msg-wrap ${type}"><div class="msg-txt"><b>${m.name}:</b><br>${m.text}</div></div>`;
            });
            stream.scrollTop = stream.scrollHeight;
            lastGCount = entries.length;
        }

        async function searchUsers() {
            const q = document.getElementById('s-input').value.toLowerCase().trim();
            const box = document.getElementById('s-results');
            if(q.length < 1) { box.innerHTML = ""; return; }
            const res = await fetch(FB + "users.json");
            const all = await res.json();
            box.innerHTML = "";
            for(let id in all) {
                if(id == me.id) continue;
                const u = all[id];
                if(u.username.includes(q) || u.name.toLowerCase().includes(q)) {
                    box.innerHTML += `<div class="friend-card"><b>${u.name}</b>
                        <button onclick="sendReq('${id}')" style="background:var(--primary); color:white; border:none; padding:5px 12px; border-radius:8px;">إضافة</button>
                    </div>`;
                }
            }
        }

        async function sendReq(id) {
            await fetch(FB + `requests/${id}/${me.id}.json`, { method: 'PUT', body: JSON.stringify({name: me.name}) });
            alert("تم إرسال الطلب!");
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            const target = document.getElementById(p + '-page');
            if(target) target.classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            toggleSidebar(true);
        }

        function toggleSidebar(c=false) {
            const s = document.getElementById('sidebar'), o = document.getElementById('overlay');
            if(c) { s.classList.remove('active'); o.style.display="none"; return; }
            s.classList.toggle('active'); o.style.display = s.classList.contains('active')?"block":"none";
        }
        function toggleDark() { document.body.classList.toggle('dark'); }
    </script>
</body>
</html>
