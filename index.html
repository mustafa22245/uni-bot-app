<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المساعد الأكاديمي v26 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --header-grad: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%);
            --border: #E2E8F0; --gray: #94A3B8; --red: #EF4444;
        }
        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8; --border: #334155;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }

        /* الشاشات */
        .page { display: none; min-height: 100vh; animation: fadeIn 0.4s ease; box-sizing: border-box; padding: 20px 20px 120px; }
        .page.active { display: block; }

        /* الشريط السفلي المتطور */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-link { text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; position: relative; }
        .nav-link.active { color: var(--primary); font-weight: 700; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        
        /* نقطة الإشعارات الحمراء */
        .badge { position: absolute; top: -2px; right: 25%; width: 10px; height: 10px; background: var(--red); border-radius: 50%; border: 2px solid var(--card); display: none; }

        /* مربع حوار مخصص (Custom Alert) */
        #custom-dialog { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .dialog-box { background: var(--card); width: 85%; max-width: 350px; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); animation: popScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .dialog-btn { background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 12px; font-weight: bold; margin-top: 15px; cursor: pointer; }

        /* الشات والقوائم */
        .chat-view { height: 60vh; background: var(--card); border-radius: 25px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        #chat-stream, #p-chat-stream { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .friend-row { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(4px); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popScale { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body id="appBody">

    <div id="onboarding" style="display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; background: white; position: fixed; inset: 0; z-index: 9999;">
        <h2 style="margin-bottom: 20px;">مرحباً بك مجدداً 🎓</h2>
        <input type="text" id="r-user" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:1px solid #ddd;" placeholder="اسم المستخدم">
        <input type="text" id="r-name" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:1px solid #ddd;" placeholder="الاسم الحقيقي">
        <button onclick="register()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:bold;">دخول 🚀</button>
    </div>

    <div id="custom-dialog">
        <div class="dialog-box">
            <h3 id="dialog-title">تنبيه</h3>
            <p id="dialog-msg"></p>
            <button class="dialog-btn" onclick="closeDialog()">حسناً</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div id="home-page" class="page active" style="padding:0;">
        <div style="background: var(--header-grad); padding: 50px 20px 30px; text-align: center; position: relative;">
            <i class="fas fa-bars" onclick="toggleSidebar()" style="position:absolute; right:20px; top:25px; font-size:24px; cursor:pointer;"></i>
            <h2>المساعد الأكاديمي</h2>
            <p id="hi-user">أهلاً بك يا مصطفى</p>
        </div>
        <div style="padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="friend-row" onclick="nav('chat')" style="flex-direction:column; padding:25px; text-align:center;">
                <i class="fas fa-globe" style="font-size:30px; color:#a855f7;"></i><br><b>شات عام</b>
            </div>
            <div class="friend-row" onclick="nav('p-list')" style="flex-direction:column; padding:25px; text-align:center;">
                <i class="fas fa-comment-dots" style="font-size:30px; color:#4D95FF;"></i><br><b>دردشات خاصة</b>
            </div>
        </div>
    </div>

    <div id="p-list-page" class="page">
        <h2>📩 المحادثات الخاصة</h2>
        <div id="active-chats-box">
            <p style="text-align:center; color:gray; margin-top:50px;">سيظهر الأصدقاء الذين تراسلهم هنا.</p>
        </div>
    </div>

    <div id="friends-page" class="page">
        <h2>👥 قائمة الأصدقاء</h2>
        <div id="friends-list-box"></div>
    </div>

    <div id="p-chat-page" class="page">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
            <i class="fas fa-arrow-right" onclick="nav('p-list')" style="font-size:20px; cursor:pointer;"></i>
            <b id="p-chat-title">المحادثة</b>
        </div>
        <div class="chat-view">
            <div id="p-chat-stream"></div>
            <div style="display:flex; padding:10px; background:#f1f5f9; gap:8px;">
                <input type="text" id="p-chat-in" style="flex:1; padding:12px; border-radius:15px; border:none;" placeholder="رسالة خاصة...">
                <button onclick="sendPrivate()" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:12px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="chat-page" class="page">
        <h2>💬 الشات العام</h2>
        <div class="chat-view">
            <div id="chat-stream"></div>
            <div style="display:flex; padding:10px; background:#f1f5f9; gap:8px;">
                <input type="text" id="chat-in" style="flex:1; padding:12px; border-radius:15px; border:none;" placeholder="اكتب للجميع...">
                <button onclick="sendGlobal()" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:12px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="social-page" class="page">
        <h2>🔍 بحث عن زملاء</h2>
        <input type="text" id="s-input" style="width:100%; padding:15px; border-radius:15px; border:1px solid #ddd;" placeholder="ادخل اليوزر..." oninput="searchUsers()">
        <div id="s-results" style="margin-top:20px;"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-link active" onclick="nav('home')"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-link" onclick="nav('social')"><i class="fas fa-search"></i><span>بحث</span></div>
        <div class="nav-link" onclick="nav('p-list')">
            <div id="msg-badge" class="badge"></div>
            <i class="fas fa-comment-dots"></i><span>الخاص</span>
        </div>
        <div class="nav-link" onclick="nav('friends')">
            <div id="req-badge" class="badge"></div>
            <i class="fas fa-user-friends"></i><span>الأصدقاء</span>
        </div>
    </div>

    <script>
        const FB = "https://mmmmmm7-bc8e8-default-rtdb.firebaseio.com/";
        let me = JSON.parse(localStorage.getItem('userProfile'));
        let activeRoom = null;
        let lastGCount = 0;
        let lastPCount = 0;

        window.onload = () => {
            if(!me) document.getElementById('onboarding').style.display = 'flex';
            else { 
                initUI();
                setInterval(syncGlobal, 5000); 
                setInterval(checkNotifications, 4000);
                setInterval(syncPrivate, 3000);
            }
        };

        // --- نظام التنبيهات المخصص (Custom Alert) ---
        function showAppAlert(title, msg) {
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-msg').innerText = msg;
            document.getElementById('custom-dialog').style.display = 'flex';
        }
        function closeDialog() { document.getElementById('custom-dialog').style.display = 'none'; }

        async function register() {
            const u = document.getElementById('r-user').value.toLowerCase().trim();
            const n = document.getElementById('r-name').value.trim();
            if(u && n) {
                me = { id: Date.now(), username: u, name: n, pfp: 'https://i.ibb.co/VvzKXY7/bot-avatar.png' };
                localStorage.setItem('userProfile', JSON.stringify(me));
                await fetch(FB + "users/" + me.id + ".json", { method: 'PUT', body: JSON.stringify(me) });
                location.reload();
            }
        }

        function initUI() {
            document.getElementById('hi-user').innerText = "أهلاً بك يا " + me.name;
            loadFriends();
        }

        // --- نظام الإشعارات الحمراء ---
        async function checkNotifications() {
            // فحص طلبات الصداقة
            const reqRes = await fetch(FB + "requests/" + me.id + ".json");
            const reqData = await reqRes.json();
            document.getElementById('req-badge').style.display = reqData ? 'block' : 'none';

            // فحص الرسائل الخاصة (تبسيطاً سنفحص وجود تحديث في غرف الدردشة)
            document.getElementById('msg-badge').style.display = 'none'; // يمكن تطويره لاحقاً لفحص الرسائل غير المقروءة
        }

        // --- نظام الدردشة الخاصة والقوائم ---
        async function loadFriends() {
            const res = await fetch(FB + "friends/" + me.id + ".json");
            const data = await res.json();
            const box = document.getElementById('friends-list-box');
            const activeChats = document.getElementById('active-chats-box');
            box.innerHTML = ""; activeChats.innerHTML = "";
            if(!data) return;
            Object.entries(data).forEach(([id, f]) => {
                const row = `
                    <div class="friend-row">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${f.pfp || 'https://i.ibb.co/VvzKXY7/bot-avatar.png'}" style="width:40px; height:40px; border-radius:50%;">
                            <b>${f.name}</b>
                        </div>
                        <button onclick="openChat('${id}', '${f.name}')" style="background:var(--primary); color:white; border:none; padding:8px 12px; border-radius:10px;">مراسلة</button>
                    </div>`;
                box.innerHTML += row;
                activeChats.innerHTML += row;
            });
        }

        function openChat(friendId, friendName) {
            const ids = [me.id, friendId].sort();
            activeRoom = `${ids[0]}_${ids[1]}`;
            document.getElementById('p-chat-title').innerText = "المحادثة مع " + friendName;
            document.getElementById('p-chat-stream').innerHTML = "";
            lastPCount = 0;
            nav('p-chat');
            syncPrivate();
        }

        async function sendPrivate() {
            const input = document.getElementById('p-chat-in');
            if(!input.value.trim() || !activeRoom) return;
            const msg = { uid: me.id, name: me.name, text: input.value, time: Date.now() };
            input.value = "";
            await fetch(FB + `private_chats/${activeRoom}.json`, { method: 'POST', body: JSON.stringify(msg) });
            syncPrivate();
        }

        async function syncPrivate() {
            if(!activeRoom || document.getElementById('p-chat-page').style.display === 'none') return;
            try {
                const res = await fetch(FB + `private_chats/${activeRoom}.json`);
                const data = await res.json();
                if(!data) return;
                const entries = Object.entries(data).sort((a,b)=>a[1].time-b[1].time);
                if(entries.length === lastPCount) return;
                const stream = document.getElementById('p-chat-stream');
                entries.slice(lastPCount).forEach(([id, m]) => {
                    const type = m.uid == me.id ? 'me' : 'other';
                    stream.innerHTML += `<div style="display:flex; flex-direction:column; align-items:${type=='me'?'flex-start':'flex-end'}; margin-bottom:8px;">
                        <div style="background:${type=='me'? 'var(--primary)':'#E2E8F0'}; color:${type=='me'?'white':'#333'}; padding:10px; border-radius:15px; font-size:13px;">${m.text}</div>
                    </div>`;
                });
                stream.scrollTop = stream.scrollHeight;
                lastPCount = entries.length;
            } catch(e){}
        }

        // --- باقي الأنظمة ---
        async function syncGlobal() {
            if(document.getElementById('chat-page').style.display === 'none') return;
            const res = await fetch(FB + "chat.json");
            const data = await res.json();
            if(!data) return;
            const entries = Object.entries(data).sort((a,b)=>a[1].time-b[1].time);
            if(entries.length === lastGCount) return;
            const stream = document.getElementById('chat-stream');
            entries.slice(lastGCount).forEach(([id, m]) => {
                const type = m.uid == me.id ? 'me' : 'other';
                stream.innerHTML += `<div style="display:flex; flex-direction:column; align-items:${type=='me'?'flex-start':'flex-end'}; margin-bottom:10px;">
                    <b style="font-size:10px; margin-bottom:2px;">${m.name}</b>
                    <div style="background:${type=='me'? 'var(--primary)':'#E2E8F0'}; color:${type=='me'?'white':'#333'}; padding:10px; border-radius:15px; font-size:13px;">${m.text}</div>
                </div>`;
            });
            stream.scrollTop = stream.scrollHeight;
            lastGCount = entries.length;
        }

        async function searchUsers() {
            const q = document.getElementById('s-input').value.toLowerCase().trim();
            const box = document.getElementById('s-results');
            if(q.length < 1) { box.innerHTML = ""; return; }
            const res = await fetch(FB + "users.json");
            const all = await res.json();
            box.innerHTML = "";
            for(let id in all) {
                if(id == me.id) continue;
                const u = all[id];
                if(u.username.includes(q) || u.name.toLowerCase().includes(q)) {
                    box.innerHTML += `<div class="friend-row"><b>${u.name}</b>
                        <button onclick="sendReq('${id}')" style="background:var(--primary); color:white; border:none; padding:5px 12px; border-radius:8px;">إضافة</button>
                    </div>`;
                }
            }
        }

        async function sendReq(id) {
            await fetch(FB + `requests/${id}/${me.id}.json`, { method: 'PUT', body: JSON.stringify({name: me.name}) });
            showAppAlert("تم الإرسال", "تم إرسال طلب الصداقة بنجاح!");
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            const target = document.getElementById(p + '-page');
            if(target) target.classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            // تحديد الزر النشط في الأسفل
            const links = { home:0, social:1, 'p-list':2, friends:3 };
            if(links[p] !== undefined) document.querySelectorAll('.nav-link')[links[p]].classList.add('active');
        }

        function toggleSidebar() { /* كود القائمة الجانبية هنا */ }
        function toggleDark() { document.body.classList.toggle('dark'); }
    </script>
</body>
</html>
