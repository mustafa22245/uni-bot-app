<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الحلة الجامعي</title>
    <style>
        :root { --main: #0088cc; --bg: #f8fafd; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; direction: rtl; text-align: center; }
        .header { background: #0088cc; color: white; padding: 20px; border-radius: 0 0 20px 20px; }
        .container { padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; }
        .panel { display: none; background: white; margin: 10px; padding: 20px; border-radius: 15px; min-height: 200px; }
        .btn-back { background: #eee; border: none; padding: 10px; width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .item { background: #f1f1f1; padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="header">
    <h2>🎓 تطبيق الحلة الجامعي</h2>
</div>

<div class="container" id="mainGrid">
    <div class="grid">
        <div class="card" onclick="start('tips')">📢<br>نصيحة اليوم</div>
        <div class="card" onclick="start('files')">📁<br>الملازم</div>
        <div class="card" onclick="start('tr')">✅<br>المترجم</div>
        <div class="card" onclick="start('exams')">⏳<br>الامتحانات</div>
    </div>
</div>

<div id="resultsPanel" class="panel">
    <button class="btn-back" onclick="home()">🔙 رجوع</button>
    <div id="content"></div>
</div>

<script>
    // الرابط المباشر
    const API = "http://fi3.bot-hosting.net:20179";
    // البروكسي لتجاوز الحماية
    const PROXY = "https://api.allorigins.win/get?url=";

    async function start(type) {
        document.getElementById('mainGrid').style.display = "none";
        document.getElementById('resultsPanel').style.display = "block";
        const box = document.getElementById('content');
        box.innerHTML = "جاري التحميل... 🔄";

        try {
            let url = "";
            if(type === 'tips') url = API + "/get_tip";
            else if(type === 'files') url = API + "/get_categories";
            else { box.innerHTML = "قريباً..."; return; }

            const response = await fetch(PROXY + encodeURIComponent(url));
            const data = await response.json();
            const result = JSON.parse(data.contents);

            if(type === 'tips') {
                box.innerHTML = `<h3>🌟 نصيحة اليوم</h3><p>${result.tip}</p>`;
            } else if(type === 'files') {
                box.innerHTML = "<h3>📂 الأقسام</h3>";
                result.forEach(c => {
                    box.innerHTML += `<div class="card" style="margin-bottom:10px" onclick="loadFiles('${c}')">${c}</div>`;
                });
            }
        } catch (e) {
            box.innerHTML = "❌ فشل الاتصال. تأكد من تشغيل السيرفر.";
        }
    }

    async function loadFiles(name) {
        const box = document.getElementById('content');
        box.innerHTML = "جاري جلب الملفات... 📄";
        try {
            const url = API + "/get_files/" + encodeURIComponent(name);
            const response = await fetch(PROXY + encodeURIComponent(url));
            const data = await response.json();
            const files = JSON.parse(data.contents);
            
            box.innerHTML = `<h3>📄 ملفات ${name}</h3>`;
            for(let f in files) {
                box.innerHTML += `<div class="item"><span>${f}</span> <a href="${files[f]}" target="_blank">👁️ عرض</a></div>`;
            }
        } catch (e) { box.innerHTML = "خطأ في التحميل."; }
    }

    function home() {
        document.getElementById('mainGrid').style.display = "block";
        document.getElementById('resultsPanel').style.display = "none";
    }
</script>

</body>
</html>
