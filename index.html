<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المساعد الأكاديمي 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --header-grad: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%);
            --border: #E2E8F0; --gray: #94A3B8;
        }

        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8;
            --header-grad: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
            --border: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }

        /* شاشة التسجيل */
        #onboarding { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .in-box { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); font-family: 'Cairo'; background: #f8fafc; }

        /* الهيدر والقائمة */
        .sidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 310px; height: 100%; background: var(--card); z-index: 2000; transition: 0.4s; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .side-head { text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        .side-pfp { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }

        .app-header { background: var(--header-grad); padding: 50px 20px 30px; text-align: center; position: relative; }
        .menu-toggle { position: absolute; right: 20px; top: 25px; font-size: 24px; cursor: pointer; }
        .app-logo { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }

        /* الصفحات */
        .page { display: none; padding: 20px 20px 120px; animation: fadeIn 0.4s; box-sizing: border-box; min-height: 100vh; }
        .page.active { display: block; }

        /* الشات المتطور */
        .chat-container { height: 62vh; background: var(--card); border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        #chat-stream { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg-wrap { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .msg-wrap.me { align-self: flex-start; }
        .msg-wrap.other { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-pfp { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid var(--primary); object-fit: cover; }
        .msg-txt { padding: 10px 14px; border-radius: 15px; font-size: 13px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .me .msg-txt { background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .other .msg-txt { background: #E2E8F0; color: #333; border-bottom-left-radius: 2px; }

        /* الشريط السفلي */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-btn { text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--primary); font-weight: 700; }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 3px; }

        /* عناصر إضافية */
        .msg-pop { position: fixed; background: white; border-radius: 10px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); display: none; z-index: 5000; padding: 5px; min-width: 130px; }
        .pop-item { padding: 10px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 5px; }
        .modal-user { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 6000; display: none; flex-direction: column; padding: 30px; animation: slideUp 0.3s; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(3px); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body id="appBody">

    <div id="onboarding">
        <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
        <h2 style="margin-bottom: 15px;">إنشاء بروفايلك</h2>
        <input type="text" id="reg-user" class="in-box" placeholder="اسم المستخدم (Username)">
        <input type="text" id="reg-name" class="in-box" placeholder="الاسم الكامل">
        <input type="text" id="reg-uni" class="in-box" placeholder="الجامعة">
        <input type="text" id="reg-lvl" class="in-box" placeholder="المرحلة الدراسية">
        <button class="btn-main" onclick="register()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">حفظ ودخول 🚀</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div id="msg-pop" class="msg-pop">
        <div class="pop-item" onclick="copyText()"><i class="fas fa-copy"></i> نسخ النص</div>
        <div class="pop-item" onclick="replyMsg()"><i class="fas fa-reply"></i> رد على الرسالة</div>
    </div>

    <div id="user-modal" class="modal-user">
        <i class="fas fa-times" onclick="closeUserModal()" style="font-size: 24px; cursor: pointer;"></i>
        <div style="text-align: center; margin-top: 50px;">
            <img id="m-pfp" src="" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); object-fit: cover;">
            <h2 id="m-name" style="margin: 10px 0;"></h2>
            <span id="m-user" style="color: var(--primary); font-weight:bold;"></span>
            <div style="margin-top: 20px; background: #f8fafc; padding: 20px; border-radius: 15px; text-align: right;">
                <b>الجامعة:</b> <span id="m-uni"></span><br>
                <b>المرحلة:</b> <span id="m-lvl"></span>
            </div>
            <button onclick="alert('تم إرسال طلب صداقة')" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; margin-top:20px;">إضافة صديق</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="side-head">
            <img id="my-side-pfp" src="" class="side-pfp">
            <h3 id="my-side-name" style="margin: 10px 0 0;">...</h3>
            <span id="my-side-user" style="color: var(--primary); font-size: 12px;"></span>
        </div>
        <div style="margin-top:20px;">
            <div class="side-btn" onclick="nav('edit')" style="padding:15px; cursor:pointer;"><i class="fas fa-user-edit"></i> تعديل البروفايل</div>
            <div class="side-btn" onclick="toggleDark()" style="padding:15px; cursor:pointer;"><i class="fas fa-moon"></i> الوضع الليلي</div>
            <div class="side-btn" onclick="window.open('https://t.me/M3y4_p')" style="padding:15px; cursor:pointer;"><i class="fas fa-paper-plane"></i> تواصل مع المطور</div>
            <div class="side-btn" onclick="localStorage.clear(); location.reload();" style="padding:15px; color:red; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</div>
        </div>
    </div>

    <div id="home-page" class="page active" style="padding:0;">
        <div class="app-header">
            <i class="fas fa-bars menu-toggle" onclick="toggleSidebar()"></i>
            <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
            <h2 id="welcome-name">مرحباً بك</h2>
        </div>
        <div style="padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            <div class="item-card" onclick="nav('subjects')" style="background:white; padding:15px; border-radius:15px; text-align:center;"><i class="fas fa-graduation-cap" style="color:var(--primary); font-size:24px;"></i><br><small>مواد الفاينل</small></div>
            <div class="item-card" onclick="nav('social')" style="background:white; padding:15px; border-radius:15px; text-align:center;"><i class="fas fa-user-friends" style="color:#2ecc71; font-size:24px;"></i><br><small>أصدقاء</small></div>
            <div class="item-card" onclick="nav('chat')" style="background:white; padding:15px; border-radius:15px; text-align:center;"><i class="fas fa-comments" style="color:#a855f7; font-size:24px;"></i><br><small>شات مباشر</small></div>
        </div>
    </div>

    <div id="chat-page" class="page">
        <h2>💬 الشات العام</h2>
        <div class="chat-container">
            <div id="chat-stream"></div>
            <div style="display:flex; padding:10px; background:#f1f5f9; gap:10px;">
                <input type="text" id="chat-in" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;" placeholder="اكتب رسالة...">
                <button id="send-btn" onclick="sendMsg()" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="subjects-page" class="page"><h2>📂 مواد الفاينل</h2><div id="files-list"></div></div>
    <div id="fav-page" class="page"><h2>⭐ المفضلة</h2><div id="fav-list"></div></div>
    <div id="social-page" class="page">
        <h2>🔍 بحث عن زملاء</h2>
        <input type="text" class="in-box" id="user-search" placeholder="ابحث باليوزر أو الاسم..." oninput="liveSearch()">
        <div id="search-results"></div>
    </div>
    <div id="edit-page" class="page">
        <h2>🛠 تعديل البروفايل</h2>
        <div style="text-align:center;">
            <img id="edit-pfp-view" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary); object-fit:cover;">
            <input type="file" id="up-file" style="display:none" onchange="previewImg(this)">
            <button onclick="document.getElementById('up-file').click()" style="display:block; margin:10px auto;">تغيير الصورة</button>
        </div>
        <input type="text" id="e-name" class="in-box" placeholder="الاسم">
        <input type="text" id="e-uni" class="in-box" placeholder="الجامعة">
        <button onclick="saveProfile()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px;">حفظ ✅</button>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="nav('home')"><i class="fas fa-home"></i>الرئيسية</div>
        <div class="nav-btn" onclick="nav('fav')"><i class="fas fa-heart"></i>المفضلة</div>
        <div class="nav-btn" onclick="nav('chat')"><i class="fas fa-comment-dots"></i>شات</div>
        <div class="nav-btn" onclick="nav('social')"><i class="fas fa-users"></i>أصدقاء</div>
    </div>

    <script>
        const FB = "https://hillah-app-default-rtdb.firebaseio.com/";
        let user = JSON.parse(localStorage.getItem('userProfile'));
        let favs = JSON.parse(localStorage.getItem('favs')) || [];
        let lastMsgCount = 0;
        let selTxt = "";

        window.onload = () => {
            if(!user) document.getElementById('onboarding').style.display = 'flex';
            else { 
                updateUI(); 
                loadFiles(); 
                loadChat(); // تحميل أول مرة
                setInterval(loadChat, 1000); // تحديث حقيقي كل ثانية
            }
        };

        // تسجيل
        async function register() {
            const u = document.getElementById('reg-user').value.toLowerCase().trim();
            const n = document.getElementById('reg-name').value.trim();
            const uni = document.getElementById('reg-uni').value.trim();
            const l = document.getElementById('reg-lvl').value.trim();
            if(u && n) {
                user = { id: Date.now(), username: u, name: n, uni: uni, lvl: l, pfp: 'https://i.ibb.co/VvzKXY7/bot-avatar.png' };
                localStorage.setItem('userProfile', JSON.stringify(user));
                await fetch(FB + "users/" + user.id + ".json", { method: 'PUT', body: JSON.stringify(user) });
                location.reload();
            }
        }

        function updateUI() {
            document.getElementById('welcome-name').innerText = "مرحباً، " + user.name;
            document.getElementById('my-side-name').innerText = user.name;
            document.getElementById('my-side-user').innerText = "@" + user.username;
            document.getElementById('my-side-pfp').src = user.pfp;
            document.getElementById('edit-pfp-view').src = user.pfp;
            document.getElementById('e-name').value = user.name;
            document.getElementById('e-uni').value = user.uni;
        }

        // الشات الذكي (تحديث الرسائل الجديدة فقط)
        async function sendMsg() {
            const input = document.getElementById('chat-in');
            const text = input.value.trim();
            if(!text) return;
            const msg = { uid: user.id, name: user.name, pfp: user.pfp, text: text, time: Date.now() };
            input.value = "";
            await fetch(FB + "global_chat.json", { method: 'POST', body: JSON.stringify(msg) });
            loadChat();
        }

        async function loadChat() {
            try {
                const res = await fetch(FB + "global_chat.json");
                const data = await res.json();
                if(!data) return;
                
                const entries = Object.entries(data).sort((a,b)=>a[1].time - b[1].time);
                if(entries.length === lastMsgCount) return;

                const stream = document.getElementById('chat-stream');
                const newMsgs = entries.slice(lastMsgCount);

                newMsgs.forEach(([k, m]) => {
                    const type = m.uid === user.id ? 'me' : 'other';
                    const div = document.createElement("div");
                    div.className = "msg-wrap " + type;
                    div.innerHTML = `
                        <img src="${m.pfp}" class="msg-pfp" onclick="viewUser('${m.uid}')">
                        <div class="msg-txt" onclick="showPop(event, '${m.text}')">
                            <b style="font-size:10px; display:block;">${m.name}</b>${m.text}
                        </div>`;
                    stream.appendChild(div);
                });
                stream.scrollTop = stream.scrollHeight;
                lastMsgCount = entries.length;
            } catch(e) {}
        }

        // بحث
        async function liveSearch() {
            const q = document.getElementById('user-search').value.toLowerCase();
            const resBox = document.getElementById('search-results');
            if(q.length < 1) { resBox.innerHTML = ""; return; }
            const res = await fetch(FB + "users.json");
            const all = await res.json();
            resBox.innerHTML = "";
            for(let id in all) {
                const u = all[id];
                if(u.username.includes(q) || u.name.toLowerCase().includes(q)) {
                    resBox.innerHTML += `<div class="item-card" style="display:flex; align-items:center; gap:10px; padding:10px; background:white; margin-top:10px; border-radius:10px;" onclick="viewUser('${u.id}')">
                        <img src="${u.pfp}" width="40" height="40" style="border-radius:50%">
                        <div style="text-align:right"><b>${u.name}</b><br><small>@${u.username}</small></div>
                    </div>`;
                }
            }
        }

        async function viewUser(uid) {
            const res = await fetch(FB + "users/" + uid + ".json");
            const u = await res.json();
            document.getElementById('m-pfp').src = u.pfp;
            document.getElementById('m-name').innerText = u.name;
            document.getElementById('m-user').innerText = "@" + u.username;
            document.getElementById('m-uni').innerText = u.uni;
            document.getElementById('m-lvl').innerText = u.lvl || 'غير محدد';
            document.getElementById('user-modal').style.display = "flex";
        }

        function closeUserModal() { document.getElementById('user-modal').style.display = "none"; }

        // الملفات
        function loadFiles() {
            const list = document.getElementById('files-list');
            const data = [{ cat: "اللغة العربية", files: [{ id: "n1", name: "ملزمة النحو", url: "https://drive.google.com/file/d/1Vl9sP1Lh5oRS6Wrg-F5gJ9s7OQCRNIpl/view" }] }];
            list.innerHTML = "";
            data.forEach(s => {
                let h = `<h4>📂 ${s.cat}</h4>`;
                s.files.forEach(f => {
                    const active = favs.includes(f.id) ? 'active' : '';
                    h += `<div class="file-row" style="background:white; padding:15px; border-radius:15px; display:flex; justify-content:space-between; margin-top:10px;">
                        <div onclick="window.open('${f.url}','_blank')"><b>${f.name}</b></div>
                        <i class="fas fa-heart heart ${active}" onclick="toggleFav('${f.id}', this)" style="cursor:pointer; color:${active?'red':'#ddd'}"></i>
                    </div>`;
                });
                list.innerHTML += h;
            });
        }

        function toggleFav(id, el) {
            if(favs.includes(id)) favs = favs.filter(i=>i!==id); else favs.push(id);
            localStorage.setItem('favs', JSON.stringify(favs));
            location.reload();
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { document.getElementById('edit-pfp-view').src = e.target.result; user.pfp = e.target.result; };
                r.readAsDataURL(input.files[0]);
            }
        }

        async function saveProfile() {
            user.name = document.getElementById('e-name').value;
            user.uni = document.getElementById('e-uni').value;
            localStorage.setItem('userProfile', JSON.stringify(user));
            await fetch(FB + "users/" + user.id + ".json", { method: 'PATCH', body: JSON.stringify(user) });
            alert("تم الحفظ!"); location.reload();
        }

        function nav(p) {
            document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
            document.getElementById(p+"-page").classList.add("active");
            document.querySelectorAll(".nav-btn").forEach(e=>e.classList.remove("active"));
            toggleSidebar(true);
        }

        function toggleSidebar(c=false) {
            const s = document.getElementById('sidebar'), o = document.getElementById('overlay');
            if(c) { s.classList.remove('active'); o.style.display="none"; return; }
            s.classList.toggle('active'); o.style.display = s.classList.contains('active')?"block":"none";
        }

        function showPop(e, text) {
            selTxt = text;
            const pop = document.getElementById('msg-pop');
            pop.style.display = "block"; pop.style.top = e.clientY + "px"; pop.style.left = e.clientX + "px";
            e.stopPropagation();
        }
        document.onclick = () => document.getElementById('msg-pop').style.display="none";
        function copyText() { navigator.clipboard.writeText(selTxt); alert("تم النسخ!"); }
        function replyMsg() { document.getElementById('chat-in').value = "الرد على: " + selTxt + " -> "; document.getElementById('chat-in').focus(); }
        function toggleDark() { document.body.classList.toggle('dark'); }
    </script>
</body>
</html>
