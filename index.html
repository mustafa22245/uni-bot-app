<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة المساعد الأكاديمي 🎓</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#F0F4F8;--card:#fff;--text:#1E293B;--primary:#4D95FF;
    --border:#E2E8F0;--gray:#94A3B8;
}
body{font-family:Cairo;background:var(--bg);margin:0;color:var(--text)}
.page{display:none;padding:20px}
.page.active{display:block}
.chat-container{height:65vh;background:#fff;border-radius:15px;display:flex;flex-direction:column;overflow:hidden}
#chat-stream{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.msg-wrap{display:flex;gap:8px;max-width:85%}
.msg-wrap.me{align-self:flex-start}
.msg-wrap.other{align-self:flex-end;flex-direction:row-reverse}
.msg-txt{padding:10px;border-radius:12px;font-size:13px}
.me .msg-txt{background:var(--primary);color:#fff}
.other .msg-txt{background:#eee}
.nav-bar{position:fixed;bottom:0;width:100%;display:flex;background:#fff}
.nav-btn{flex:1;text-align:center;padding:10px;font-size:12px}
.nav-btn.active{color:var(--primary)}
</style>
</head>

<body>

<!-- الصفحات -->
<div id="home-page" class="page active">
<h2>الرئيسية</h2>
<button onclick="nav('chat')">اذهب للشات</button>
</div>

<div id="chat-page" class="page">
<h2>💬 الشات العام</h2>

<div class="chat-container">
    <div id="chat-stream"></div>

    <div style="display:flex;padding:10px;gap:10px;background:#f1f5f9">
        <input id="chat-in" style="flex:1;padding:10px;border-radius:10px;border:1px solid #ccc">
        <button id="send-btn" onclick="sendMsg()">إرسال</button>
    </div>
</div>
</div>

<div class="nav-bar">
<div class="nav-btn active" onclick="nav('home')">الرئيسية</div>
<div class="nav-btn" onclick="nav('chat')">الشات</div>
</div>

<script>
const FB="https://hillah-app-default-rtdb.firebaseio.com/";
let user=JSON.parse(localStorage.getItem("userProfile"))||{
    id:Date.now(),
    name:"مستخدم",
    pfp:"https://i.ibb.co/VvzKXY7/bot-avatar.png"
};

let lastMsgCount=0;

// =======================
// تشغيل
// =======================
window.onload=()=>{
    loadChat();
    setInterval(loadChat,2500); // تحسين
};

// =======================
// إرسال رسالة
// =======================
async function sendMsg(){
    const input=document.getElementById("chat-in");
    const btn=document.getElementById("send-btn");
    const text=input.value.trim();

    if(!text||btn.disabled)return;

    btn.disabled=true;

    const msg={
        uid:user.id,
        name:user.name,
        pfp:user.pfp,
        text:text,
        time:Date.now()
    };

    input.value="";

    try{
        await fetch(FB+"global_chat.json",{
            method:"POST",
            body:JSON.stringify(msg)
        });
    }catch(e){
        console.log(e);
    }

    btn.disabled=false;
}

// =======================
// تحميل الشات (محسن)
// =======================
async function loadChat(){
    try{
        const res=await fetch(FB+"global_chat.json");
        const data=await res.json();
        if(!data)return;

        const entries=Object.entries(data);

        // ترتيب
        entries.sort((a,b)=>a[1].time-b[1].time);

        const stream=document.getElementById("chat-stream");

        if(entries.length===lastMsgCount)return;

        const newMsgs=entries.slice(lastMsgCount);

        newMsgs.forEach(([k,m])=>{
            const type=m.uid===user.id?"me":"other";

            const div=document.createElement("div");
            div.className="msg-wrap "+type;

            div.innerHTML=`
                <img src="${m.pfp}" width="30" height="30" style="border-radius:50%">
                <div class="msg-txt">
                    <b style="font-size:10px">${m.name}</b><br>
                    ${m.text}
                </div>
            `;

            stream.appendChild(div);
        });

        stream.scrollTop=stream.scrollHeight;
        lastMsgCount=entries.length;

    }catch(e){
        console.log("chat error",e);
    }
}

// =======================
// الرد
// =======================
function reply(text){
    const input=document.getElementById("chat-in");
    input.value="الرد على: "+text+" -> ";
    input.focus();
}

// =======================
// تنقل
// =======================
function nav(p){
    document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
    document.getElementById(p+"-page").classList.add("active");

    document.querySelectorAll(".nav-btn").forEach(e=>e.classList.remove("active"));
    if(p==="home")document.querySelectorAll(".nav-btn")[0].classList.add("active");
    if(p==="chat")document.querySelectorAll(".nav-btn")[1].classList.add("active");
}
</script>

</body>
</html>
