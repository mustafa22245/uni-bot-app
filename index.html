<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المساعد الأكاديمي 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --header-grad: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%);
            --border: #E2E8F0; --gray: #94A3B8;
        }

        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8;
            --header-grad: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }

        /* شاشة تسجيل الدخول لأول مرة */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); font-family: 'Cairo'; }
        .login-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* الهيدر */
        .app-header { background: var(--header-grad); padding: 50px 20px 30px; text-align: center; position: relative; }
        .menu-icon { position: absolute; right: 20px; top: 25px; font-size: 24px; cursor: pointer; }
        .app-logo { width: 85px; height: 85px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .app-logo img { width: 100%; height: 100%; object-fit: cover; }

        /* الصفحات */
        .page { display: none; padding: 20px 20px 120px; animation: fadeIn 0.4s; box-sizing: border-box; min-height: 100vh; }
        .page.active { display: block; }

        /* بطاقة الملف مع القلب */
        .file-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
        .file-info { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .fav-heart { font-size: 20px; color: #ddd; cursor: pointer; transition: 0.3s; margin-right: 10px; }
        .fav-heart.active { color: #ef4444; }

        /* الشات */
        .chat-container { height: 60vh; background: var(--card); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 13px; }
        .msg.sent { background: var(--primary); color: white; align-self: flex-start; }
        .msg.received { background: #eee; color: #333; align-self: flex-end; }
        .chat-input-area { display: flex; padding: 10px; background: var(--bg); gap: 10px; }
        .chat-input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); }

        /* الشريط السفلي */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); font-weight: 700; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body id="appBody">

    <div id="login-screen">
        <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
        <h2 style="margin-bottom: 20px;">إنشاء ملفك الشخصي</h2>
        <input type="text" id="reg-name" class="login-input" placeholder="اسمك الكامل">
        <input type="text" id="reg-uni" class="login-input" placeholder="اسم الجامعة">
        <input type="text" id="reg-level" class="login-input" placeholder="المرحلة الدراسية">
        <input type="number" id="reg-age" class="login-input" placeholder="العمر">
        <button class="login-btn" onclick="saveUserProfile()">ابدأ رحلتك التعليمية 🚀</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSide()"></div>

    <div id="home-page" class="page active" style="padding:0;">
        <div class="app-header">
            <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
            <h2 id="welcome-user">مرحباً بك</h2>
            <p style="font-size: 11px;">تطبيقك الاجتماعي التعليمي المتكامل</p>
        </div>

        <div style="padding: 20px;">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <div onclick="nav('subjects')" style="background: white; padding: 20px 10px; text-align: center; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                    <i class="fas fa-graduation-cap" style="color: var(--primary); font-size: 24px;"></i><br><small>مواد الفاينل</small>
                </div>
                <div onclick="nav('social')" style="background: white; padding: 20px 10px; text-align: center; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                    <i class="fas fa-users" style="color: #2ecc71; font-size: 24px;"></i><br><small>الأصدقاء</small>
                </div>
                <div onclick="nav('chat')" style="background: white; padding: 20px 10px; text-align: center; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                    <i class="fas fa-comments" style="color: #a855f7; font-size: 24px;"></i><br><small>شات عام</small>
                </div>
            </div>
        </div>
    </div>

    <div id="subjects-page" class="page">
        <h2>📂 مواد الفاينل</h2>
        <div id="subjects-list"></div>
    </div>

    <div id="chat-page" class="page">
        <h2>💬 الشات العام</h2>
        <div class="chat-container">
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" class="chat-input" placeholder="اكتب رسالة...">
                <button onclick="sendChatMessage()" style="border:none; background:var(--primary); color:white; border-radius:10px; padding:0 15px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="social-page" class="page">
        <h2>👥 الأصدقاء والبحث</h2>
        <input type="text" class="login-input" placeholder="ابحث عن صديق بالاسم...">
        <div id="users-list">
            <p style="color: gray; text-align: center; margin-top: 20px;">سيظهر المستخدمون هنا قريباً...</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('home')"><i class="fas fa-home"></i>الرئيسية</div>
        <div class="nav-item" onclick="nav('subjects')"><i class="fas fa-heart"></i>المفضلة</div>
        <div class="nav-item" onclick="nav('chat')"><i class="fas fa-comment-dots"></i>شات</div>
        <div class="nav-item" onclick="nav('social')"><i class="fas fa-user-friends"></i>أصدقاء</div>
    </div>

    <script>
        const DB_URL = "https://hillah-app-default-rtdb.firebaseio.com/"; // رابط قاعدتك
        let userData = JSON.parse(localStorage.getItem('userProfile'));
        let favorites = JSON.parse(localStorage.getItem('favs')) || [];

        // 1. فحص المستخدم لأول مرة
        window.onload = function() {
            if(!userData) {
                document.getElementById('login-screen').style.display = 'flex';
            } else {
                document.getElementById('welcome-user').innerText = "مرحباً، " + userData.name;
                loadContent();
                listenToChat();
            }
        };

        function saveUserProfile() {
            const name = document.getElementById('reg-name').value;
            const uni = document.getElementById('reg-uni').value;
            const level = document.getElementById('reg-level').value;
            const age = document.getElementById('reg-age').value;

            if(name && uni && level && age) {
                const profile = { name, uni, level, age, id: Date.now() };
                localStorage.setItem('userProfile', JSON.stringify(profile));
                // رفع المستخدم للسحاب ليجده الآخرون
                fetch(DB_URL + "users/" + profile.id + ".json", { method: 'PUT', body: JSON.stringify(profile) });
                location.reload();
            } else { alert("يرجى إكمال جميع الحقول"); }
        }

        // 2. إدارة الملفات والمفضلة
        const myData = {
            subjects: [
                { name: "اللغة العربية", files: [{ id: "1", name: "ملزمة النحو", url: "https://drive.google.com/file/d/1Vl9sP1Lh5oRS6Wrg-F5gJ9s7OQCRNIpl/view" }] }
            ]
        };

        function loadContent() {
            const list = document.getElementById('subjects-list');
            list.innerHTML = "";
            myData.subjects.forEach(sub => {
                let html = `<h4>${sub.name}</h4>`;
                sub.files.forEach(f => {
                    const isFav = favorites.includes(f.id) ? 'active' : '';
                    html += `
                        <div class="file-card">
                            <div class="file-info" onclick="window.open('${f.url}','_blank')">
                                <i class="fas fa-file-pdf" style="color:red;"></i>
                                <span>${f.name}</span>
                            </div>
                            <i class="fas fa-heart fav-heart ${isFav}" onclick="toggleFav('${f.id}', this)"></i>
                        </div>`;
                });
                list.innerHTML += html;
            });
        }

        function toggleFav(id, el) {
            if(favorites.includes(id)) {
                favorites = favorites.filter(i => i !== id);
                el.classList.remove('active');
            } else {
                favorites.push(id);
                el.classList.add('active');
            }
            localStorage.setItem('favs', JSON.stringify(favorites));
        }

        // 3. الشات العام (مباشر)
        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            const msg = { sender: userData.name, text: input.value, time: Date.now() };
            await fetch(DB_URL + "public_chat.json", { method: 'POST', body: JSON.stringify(msg) });
            input.value = "";
            listenToChat();
        }

        async function listenToChat() {
            const res = await fetch(DB_URL + "public_chat.json");
            const data = await res.json();
            const chatBox = document.getElementById('chat-messages');
            chatBox.innerHTML = "";
            for(let key in data) {
                const m = data[key];
                const type = m.sender === userData.name ? 'sent' : 'received';
                chatBox.innerHTML += `<div class="msg ${type}"><b>${m.sender}:</b><br>${m.text}</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 4. التنقل
        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById(p + '-page').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        }

        function toggleDark() { document.body.classList.toggle('dark'); }
    </script>
</body>
</html>
