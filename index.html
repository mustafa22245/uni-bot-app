<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المساعد الأكاديمي 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --header-grad: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%);
            --border: #E2E8F0; --gray: #94A3B8;
        }

        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8;
            --header-grad: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; overflow-x: hidden; }

        /* الشاشات الأساسية */
        #onboarding-screen, .page { display: none; min-height: 100vh; animation: fadeIn 0.4s; }
        .page.active { display: block; }

        /* الهيدر */
        .app-header { background: var(--header-grad); padding: 50px 20px 30px; text-align: center; position: relative; }
        .menu-icon { position: absolute; right: 20px; top: 25px; font-size: 24px; cursor: pointer; }
        .app-logo { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .app-logo img { width: 100%; height: 100%; object-fit: cover; }

        /* الشات المتطور */
        .chat-area { height: 65vh; background: var(--card); border-radius: 20px; display: flex; flex-direction: column; border: 1px solid var(--border); overflow: hidden; margin-top: 10px; }
        #chat-stream { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .chat-bubble-wrap { display: flex; align-items: flex-end; gap: 10px; max-width: 85%; }
        .chat-bubble-wrap.me { align-self: flex-start; flex-direction: row; }
        .chat-bubble-wrap.other { align-self: flex-end; flex-direction: row-reverse; }

        .chat-avatar { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid var(--primary); }
        .msg-content { padding: 10px 14px; border-radius: 18px; font-size: 13px; position: relative; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .me .msg-content { background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .other .msg-content { background: #E2E8F0; color: #333; border-bottom-left-radius: 2px; }

        /* القائمة المنبثقة للرسائل */
        .msg-menu { position: fixed; background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: none; z-index: 3000; padding: 5px; min-width: 120px; }
        .menu-item { padding: 10px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 8px; }
        .menu-item:hover { background: #f1f5f9; }

        /* بروفايل المستخدم الآخر */
        .user-view-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 4000; display: none; flex-direction: column; padding: 25px; animation: slideUp 0.3s; }
        .user-view-header { text-align: center; margin-top: 40px; }
        .user-view-pfp { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); margin-bottom: 15px; }

        /* الشريط السفلي */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-link { text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; }
        .nav-link.active { color: var(--primary); font-weight: 700; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 3px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(4px); }
        .sidebar { position: fixed; right: -100%; top: 0; width: 80%; max-width: 300px; height: 100%; background: var(--card); z-index: 2000; transition: 0.4s; padding: 25px; box-sizing: border-box; }
        .sidebar.active { right: 0; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body id="appBody">

    <div id="onboarding-screen" style="flex-direction: column; align-items: center; justify-content: center; padding: 30px;">
        <h2 style="margin-bottom: 20px;">إنشاء حسابك الجامعي</h2>
        <input type="text" id="reg-user" style="width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd;" placeholder="اسم المستخدم (Username)">
        <input type="text" id="reg-name" style="width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd;" placeholder="الاسم الكامل">
        <button onclick="finishReg()" style="width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold;">دخول المنصة 🚀</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div id="msg-menu" class="msg-menu">
        <div class="menu-item" onclick="copyMsg()"><i class="fas fa-copy"></i> نسخ النص</div>
        <div class="menu-item" onclick="replyMsg()"><i class="fas fa-reply"></i> رد</div>
    </div>

    <div id="user-view" class="user-view-modal">
        <i class="fas fa-times" onclick="closeUserView()" style="font-size: 24px; cursor: pointer;"></i>
        <div class="user-view-header">
            <img id="v-pfp" src="" class="user-view-pfp">
            <h2 id="v-name" style="margin: 5px 0;"></h2>
            <span id="v-user" style="color: var(--primary);"></span>
            <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                <div style="background: #f8fafc; padding: 15px; border-radius: 12px; text-align: right;">
                    <b>الجامعة:</b> <span id="v-uni"></span><br>
                    <b>المرحلة:</b> <span id="v-lvl"></span>
                </div>
                <button class="menu-item" style="background: var(--primary); color: white; justify-content: center;" onclick="alert('تم إرسال طلب الصداقة!')">إضافة صديق</button>
                <button class="menu-item" style="background: #fee2e2; color: #ef4444; justify-content: center;" onclick="alert('تم حظر المستخدم')">حظر المستخدم</button>
            </div>
        </div>
    </div>

    <div id="sidebar" class="sidebar">
        <div style="text-align: center; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px;">
            <img id="my-side-pfp" src="" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary);">
            <h3 id="my-side-name" style="margin: 10px 0 0;"></h3>
        </div>
        <div class="side-item" onclick="nav('home')"><i class="fas fa-home"></i> الرئيسية</div>
        <div class="side-item" onclick="toggleDark()"><i class="fas fa-moon"></i> الوضع الليلي</div>
        <div class="side-item" style="color:#ef4444; margin-top:20px;" onclick="localStorage.clear(); location.reload();"><i class="fas fa-power-off"></i> تسجيل الخروج</div>
    </div>

    <div id="home-page" class="page active" style="padding:0;">
        <div class="app-header">
            <i class="fas fa-bars menu-icon" onclick="toggleSidebar()"></i>
            <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
            <h2 id="hi-user">مرحباً بك</h2>
        </div>
        <div style="padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div onclick="nav('chat')" style="background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                <i class="fas fa-comments" style="font-size: 30px; color: #a855f7;"></i><br><b>الشات العام</b>
            </div>
            <div onclick="nav('social')" style="background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                <i class="fas fa-search" style="font-size: 30px; color: #2ecc71;"></i><br><b>بحث أصدقاء</b>
            </div>
        </div>
    </div>

    <div id="chat-page" class="page">
        <h2 style="margin: 0 0 10px;">💬 غرف الدردشة</h2>
        <div class="chat-area">
            <div id="chat-stream"></div>
            <div style="display:flex; padding:10px; background:#f1f5f9; gap:10px;">
                <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;" placeholder="اكتب رسالة...">
                <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="social-page" class="page">
        <h2 style="margin-bottom: 15px;">🔍 البحث عن زملاء</h2>
        <input type="text" id="user-search" style="width:100%; padding:15px; border-radius:12px; border:1px solid #ddd;" placeholder="ادخل اليوزر أو الاسم..." oninput="realTimeSearch()">
        <div id="search-results" style="margin-top: 20px;"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-link active" onclick="nav('home')"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-link" onclick="nav('chat')"><i class="fas fa-comment-dots"></i><span>شات</span></div>
        <div class="nav-link" onclick="nav('social')"><i class="fas fa-user-friends"></i><span>أصدقاء</span></div>
        <div class="nav-link" onclick="toggleSidebar()"><i class="fas fa-bars"></i><span>المزيد</span></div>
    </div>

    <script>
        const FIREBASE = "https://hillah-app-default-rtdb.firebaseio.com/";
        let me = JSON.parse(localStorage.getItem('userProfile'));
        let selectedMsg = "";

        window.onload = () => {
            if(!me) { document.getElementById('onboarding-screen').style.display = 'flex'; }
            else { 
                updateUI(); 
                setInterval(loadChat, 2000); // تحديث الشات تلقائياً كل ثانيتين
            }
        };

        async function finishReg() {
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            const name = document.getElementById('reg-name').value.trim();
            if(user && name) {
                me = { username: user, name: name, pfp: 'https://i.ibb.co/VvzKXY7/bot-avatar.png', university: 'بابل', level: 'الأولى', id: Date.now() };
                localStorage.setItem('userProfile', JSON.stringify(me));
                await fetch(FIREBASE + "users/" + me.id + ".json", { method: 'PUT', body: JSON.stringify(me) });
                location.reload();
            }
        }

        function updateUI() {
            document.getElementById('hi-user').innerText = "مرحباً، " + me.name;
            document.getElementById('my-side-name').innerText = me.name;
            document.getElementById('my-side-pfp').src = me.pfp;
        }

        // شات ذكي ولحظي
        async function sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            const msg = { senderId: me.id, senderName: me.name, senderPfp: me.pfp, text: input.value, time: Date.now() };
            await fetch(FIREBASE + "global_chat.json", { method: 'POST', body: JSON.stringify(msg) });
            input.value = "";
            loadChat();
        }

        async function loadChat() {
            const res = await fetch(FIREBASE + "global_chat.json");
            const data = await res.json();
            const stream = document.getElementById('chat-stream');
            stream.innerHTML = "";
            for(let k in data) {
                const m = data[k];
                const isMe = m.senderId === me.id ? 'me' : 'other';
                stream.innerHTML += `
                    <div class="chat-bubble-wrap ${isMe}">
                        <img src="${m.senderPfp}" class="chat-avatar" onclick="viewUser('${m.senderId}')">
                        <div class="msg-content" onclick="showMsgMenu(event, '${m.text}')">
                            <b style="font-size: 10px; display: block;">${m.senderName}</b>
                            ${m.text}
                        </div>
                    </div>`;
            }
            stream.scrollTop = stream.scrollHeight;
        }

        // بحث لحظي وقوي
        async function realTimeSearch() {
            const q = document.getElementById('user-search').value.toLowerCase();
            const results = document.getElementById('search-results');
            if(q.length < 1) { results.innerHTML = ""; return; }

            const res = await fetch(FIREBASE + "users.json");
            const all = await res.json();
            results.innerHTML = "";
            for(let id in all) {
                const u = all[id];
                if(u.username.includes(q) || u.name.toLowerCase().includes(q)) {
                    results.innerHTML += `
                        <div style="background:white; padding:15px; border-radius:15px; display:flex; align-items:center; gap:15px; margin-bottom:10px; border:1px solid #eee;" onclick="viewUser('${u.id}')">
                            <img src="${u.pfp}" style="width:45px; height:45px; border-radius:50%;">
                            <div><b>${u.name}</b><br><small style="color:var(--primary);">@${u.username}</small></div>
                        </div>`;
                }
            }
        }

        // عرض بروفايل المستخدم
        async function viewUser(userId) {
            const res = await fetch(FIREBASE + "users/" + userId + ".json");
            const u = await res.json();
            document.getElementById('v-pfp').src = u.pfp;
            document.getElementById('v-name').innerText = u.name;
            document.getElementById('v-user').innerText = "@" + u.username;
            document.getElementById('v-uni').innerText = u.university;
            document.getElementById('v-lvl').innerText = u.level;
            document.getElementById('user-view').style.display = "flex";
        }

        function closeUserView() { document.getElementById('user-view').style.display = "none"; }

        // قائمة الرسالة
        function showMsgMenu(e, text) {
            selectedMsg = text;
            const menu = document.getElementById('msg-menu');
            menu.style.display = "block";
            menu.style.top = e.clientY + "px";
            menu.style.left = e.clientX + "px";
            e.stopPropagation();
        }

        document.onclick = () => document.getElementById('msg-menu').style.display = "none";

        function copyMsg() { navigator.clipboard.writeText(selectedMsg); alert("تم النسخ!"); }
        function replyMsg() { document.getElementById('chat-input').value = `الرد على: (${selectedMsg}) -> `; }

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById(p + '-page').classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            toggleSidebar(true);
        }

        function toggleSidebar(close = false) {
            const s = document.getElementById('sidebar'), o = document.getElementById('overlay');
            if(close) { s.classList.remove('active'); o.style.display="none"; return; }
            s.classList.toggle('active'); o.style.display = s.classList.contains('active') ? "block" : "none";
        }
        function toggleDark() { document.body.classList.toggle('dark'); }
    </script>
</body>
</html>
