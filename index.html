<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الحلة الجامعي - النسخة المستقرة</title>
    <style>
        :root { --main: #0088cc; --bg: #f8fafd; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; direction: rtl; }
        .header { background: linear-gradient(135deg, #0088cc, #005588); color: white; padding: 30px; text-align: center; border-radius: 0 0 30px 30px; }
        .container { padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 25px 15px; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-weight: bold; transition: 0.2s; }
        .card:active { transform: scale(0.9); }
        .results-panel { display: none; background: white; border-radius: 20px; padding: 20px; margin-top: 10px; min-height: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .back-btn { background: #eee; border: none; padding: 12px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; width: 100%; font-weight: bold; }
        .list-item { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 5px solid var(--main); display: flex; justify-content: space-between; align-items: center; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 15px; }
        
        /* تصميم لوحة الإدارة */
        #adminPanel { background: #2c3e50 !important; color: white; display: none; }
        .admin-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; box-sizing: border-box; background: #34495e; color: white; }
        .admin-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .admin-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">🎓 تطبيق الحلة الجامعي</h2>
        <p style="margin:5px; opacity:0.8">نظام الإدارة والتحكم الكامل ✅</p>
    </div>

    <div class="container">
        <div id="mainGrid" class="grid">
            <div class="card" onclick="openSection('files')">📁<br>الملازم</div>
            <div class="card" onclick="openSection('tr')">✅<br>المترجم</div>
            <div class="card" onclick="openSection('tips')">📢<br>نصيحة اليوم</div>
            <div class="card" onclick="openSection('exams')">⏳<br>الامتحانات</div>
        </div>

        <div id="resultsPanel" class="results-panel">
            <button class="back-btn" onclick="goHome()">🔙 العودة للرئيسية</button>
            <div id="dynamicContent"></div>
        </div>

        <div id="adminPanel" class="results-panel">
            <button class="back-btn" style="background:#e74c3c; color:white;" onclick="goHome()">❌ إغلاق لوحة التحكم</button>
            <h3 style="text-align:center; color:#3498db;">🛠️ غرفة قيادة التطبيق</h3>
            
            <div style="background:#34495e; padding:15px; border-radius:15px; margin-bottom:15px;">
                <label>📍 إضافة نصيحة جديدة:</label>
                <input type="text" id="newTip" class="admin-input" placeholder="اكتب النصيحة هنا...">
                <button class="admin-btn" style="background:#3498db; color:white;" onclick="addTip()">➕ إضافة للقائمة</button>
            </div>

            <div style="background:#34495e; padding:15px; border-radius:15px;">
                <label>📍 إضافة قسم وملفات:</label>
                <input type="text" id="newCat" class="admin-input" placeholder="اسم القسم (مثلاً: التحليل المرضي)">
                <input type="text" id="fileName" class="admin-input" placeholder="اسم الملزمة">
                <input type="text" id="fileUrl" class="admin-input" placeholder="رابط الملف المباشر PDF">
                <button class="admin-btn" style="background:#2ecc71; color:white; font-size:16px;" onclick="saveEntry()">💾 حفظ ونشر التعديلات فوراً</button>
            </div>
        </div>

        <div style="text-align:center; padding:30px;">
            <button onclick="openAdmin()" style="background:none; border:none; color:#ccc; font-size:11px; cursor:pointer; letter-spacing:1px;">ADMIN CONTROL PANEL</button>
        </div>
    </div>

    <script>
        const API_URL = "http://fi3.bot-hosting.net:20179";
        const PROXY = "https://api.allorigins.win/get?url=";
        let currentDB = { categories: {}, tips: [] };

        // 1. وظيفة جلب البيانات العامة
        async function getData(path) {
            const res = await fetch(PROXY + encodeURIComponent(API_URL + path));
            const json = await res.json();
            return JSON.parse(json.contents);
        }

        // 2. وظيفة فتح أقسام الطلاب
        async function openSection(id) {
            document.getElementById('mainGrid').style.display = "none";
            document.getElementById('resultsPanel').style.display = "block";
            const content = document.getElementById('dynamicContent');
            content.innerHTML = "<p style='text-align:center'>جاري الاتصال بالسيرفر... 🔄</p>";

            try {
                if (id === 'tips') {
                    const data = await getData('/get_tip');
                    content.innerHTML = `<div style="padding:40px; text-align:center; font-size:22px; color:#2c3e50; line-height:1.6;">🌟<br><br>${data.tip}</div>`;
                } else if (id === 'files') {
                    const cats = await getData('/get_categories');
                    content.innerHTML = "<h3>📂 الأقسام المتوفرة:</h3>";
                    cats.forEach(c => {
                        content.innerHTML += `<div class="card" style="width:95%; margin:10px auto; border:1px solid #eee;" onclick="loadFiles('${c}')">${c}</div>`;
                    });
                } else { content.innerHTML = "<h3 style='text-align:center'>قريباً... ⏳</h3>"; }
            } catch (e) { content.innerHTML = "<p style='color:red; text-align:center'>❌ فشل الاتصال بالسيرفر.</p>"; }
        }

        // 3. وظائف لوحة التحكم (ADMIN)
        async function openAdmin() {
            document.getElementById('mainGrid').style.display = "none";
            document.getElementById('adminPanel').style.display = "block";
            try { 
                currentDB = await getData('/get_db');
                console.log("Database Loaded:", currentDB);
            } catch(e) { alert("تنبيه: سيتم إنشاء قاعدة بيانات جديدة عند الحفظ."); }
        }

        function addTip() {
            const tip = document.getElementById('newTip').value;
            if(tip) { 
                currentDB.tips.push(tip); 
                alert("تمت الإضافة للقائمة المؤقتة. اضغط 'حفظ ونشر' للتثبيت النهائي."); 
                document.getElementById('newTip').value = ""; 
            }
        }

        // --- دالة الحفظ المحدثة والنهائية ---
        async function saveEntry() {
            const cat = document.getElementById('newCat').value;
            const name = document.getElementById('fileName').value;
            const url = document.getElementById('fileUrl').value;

            // تحديث البيانات محلياً أولاً
            if(cat && name && url) {
                if(!currentDB.categories[cat]) currentDB.categories[cat] = {};
                currentDB.categories[cat][name] = url;
            }

            try {
                const response = await fetch(API_URL + "/save_db", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentDB)
                });

                if (response.ok) {
                    alert("✅ عظبم! تم حفظ التعديلات ونشرها للطلاب بنجاح.");
                    goHome();
                } else {
                    throw new Error('Server Error');
                }
            } catch (e) {
                alert("❌ فشل الحفظ بسبب قيود الأمان.\n\nسيتم الآن فتح رابط السيرفر في صفحة جديدة، اضغط 'متابعة' هناك ثم ارجع هنا واضغط حفظ مجدداً.");
                window.open(API_URL + "/", "_blank");
            }
        }

        // 4. وظائف الملازم والرجوع
        async function loadFiles(catName) {
            const content = document.getElementById('dynamicContent');
            content.innerHTML = "جاري تحميل الملفات... 📄";
            try {
                const files = await getData('/get_files/' + encodeURIComponent(catName));
                let html = `<h3>📄 ملفات ${catName}:</h3>`;
                for(let n in files) { 
                    html += `<div class="list-item" onclick="viewFile('${files[n]}','${n}')"><span>${n}</span><span style="color:#0088cc;">👁️ عرض</span></div>`; 
                }
                content.innerHTML = html;
            } catch(e) { content.innerHTML = "خطأ في التحميل."; }
        }

        function viewFile(url, name) {
            document.getElementById('dynamicContent').innerHTML = `<h4 style="text-align:center;">👀 ${name}</h4><iframe src="${url}"></iframe>`;
        }

        function goHome() {
            document.getElementById('mainGrid').style.display = "grid";
            document.getElementById('resultsPanel').style.display = "none";
            document.getElementById('adminPanel').style.display = "none";
        }
    </script>
</body>
</html>
