<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الحلة الجامعي PRO</title>
    <style>
        :root { --main: #0088cc; --bg: #f8fafd; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; direction: rtl; }
        .header { background: linear-gradient(135deg, #0088cc, #005588); color: white; padding: 30px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 25px 15px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #f0f0f0; font-weight: bold; }
        .card:active { transform: scale(0.95); background: #f0f7ff; }
        .results-panel { display: none; background: white; border-radius: 20px; padding: 20px; margin-top: 10px; min-height: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .back-btn { background: #eee; border: none; padding: 12px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; width: 100%; font-weight: bold; }
        .list-item { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 5px solid var(--main); display: flex; justify-content: space-between; align-items: center; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">🎓 تطبيق الحلة الجامعي</h2>
        <p style="margin:5px; opacity:0.8">نظام التصفح الآمن</p>
    </div>

    <div class="container">
        <div class="grid" id="mainGrid">
            <div class="card" onclick="openSection('files')">📁<br>الملازم</div>
            <div class="card" onclick="openSection('tr')">✅<br>المترجم</div>
            <div class="card" onclick="openSection('tips')">📢<br>نصيحة اليوم</div>
            <div class="card" onclick="openSection('exams')">⏳<br>الامتحانات</div>
        </div>

        <div id="resultsPanel" class="results-panel">
            <button id="backBtn" class="back-btn" onclick="goHome()">🔙 العودة للرئيسية</button>
            <div id="dynamicContent"></div>
        </div>
    </div>

    <script>
        // الرابط مع بروكسي التشفير لضمان تجاوز حماية المتصفح
        const API_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent("http://fi3.bot-hosting.net:20179"); 

        async function openSection(id) {
            const grid = document.getElementById('mainGrid');
            const panel = document.getElementById('resultsPanel');
            const content = document.getElementById('dynamicContent');

            grid.style.display = "none";
            panel.style.display = "block";
            content.innerHTML = "<p style='text-align:center'>جاري الاتصال بالسيرفر عبر الجسر الآمن... 🔄</p>";

            try {
                if (id === 'tips') {
                    const res = await fetch(`${API_URL}/get_tip`);
                    const data = await res.json();
                    content.innerHTML = `<div style="padding:40px; text-align:center; font-size:22px; line-height:1.6">🌟 <br><br> ${data.tip}</div>`;
                } 
                else if (id === 'files') {
                    const res = await fetch(`${API_URL}/get_categories`);
                    const cats = await res.json();
                    content.innerHTML = "<h3>📂 الأقسام المتوفرة:</h3>" + 
                        cats.map(c => `<div class="card" style="width:90%; margin-bottom:10px" onclick="loadFiles('${c}')">${c}</div>`).join('');
                }
                else {
                    content.innerHTML = "<h3>قريباً...</h3><p>هذا القسم قيد التجهيز.</p>";
                }
            } catch (err) {
                console.error(err);
                content.innerHTML = `
                    <div style="color:red; text-align:center">
                        <p>❌ فشل الاتصال بالسيرفر.</p>
                        <p style="font-size:12px; color:#666">تأكد من تشغيل الاستضافة واضغط "نصيحة اليوم" مرة أخرى.</p>
                    </div>`;
            }
        }

        async function loadFiles(catName) {
            const content = document.getElementById('dynamicContent');
            content.innerHTML = "جاري جلب الملفات... 📄";
            try {
                const res = await fetch(`${API_URL}/get_files/${catName}`);
                const files = await res.json();
                let html = `<h3>📄 ملفات ${catName}:</h3>`;
                for(let name in files) {
                    html += `<div class="list-item" onclick="viewFile('${files[name]}', '${name}')"><span>${name}</span> <span style="color:var(--main)">👁️ عرض</span></div>`;
                }
                content.innerHTML = html;
                document.getElementById('backBtn').onclick = () => openSection('files');
            } catch (e) { content.innerHTML = "خطأ في الاتصال."; }
        }

        function viewFile(url, name) {
            const content = document.getElementById('dynamicContent');
            content.innerHTML = `<div style="margin-bottom:10px; font-weight:bold">👀 عرض: ${name}</div><iframe src="${url}"></iframe>`;
            document.getElementById('backBtn').onclick = () => openSection('files');
        }

        function goHome() {
            document.getElementById('mainGrid').style.display = "grid";
            document.getElementById('resultsPanel').style.display = "none";
            document.getElementById('backBtn').onclick = goHome;
        }
    </script>
</body>
</html>
