<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المساعد الأكاديمي 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --header-grad: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%);
            --border: #E2E8F0; --gray: #94A3B8;
        }

        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8;
            --border: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }

        /* شاشة التسجيل */
        #onboarding { position: fixed; inset: 0; background: #fff; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .in-box { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 15px; border: 1px solid var(--border); font-family: 'Cairo'; background: #f8fafc; font-size: 14px; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(77, 149, 255, 0.3); }

        /* القائمة الجانبية */
        .sidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 310px; height: 100%; background: var(--card); z-index: 2000; transition: 0.4s ease; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .side-head { text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        .side-pfp { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }

        /* الهيدر */
        .app-header { background: var(--header-grad); padding: 50px 20px 30px; text-align: center; position: relative; }
        .menu-toggle { position: absolute; right: 20px; top: 25px; font-size: 24px; cursor: pointer; }
        .app-logo { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }

        /* الصفحات */
        .page { display: none; padding: 20px 20px 120px; animation: fadeIn 0.4s ease; box-sizing: border-box; min-height: 100vh; }
        .page.active { display: block; }

        /* الشات */
        .chat-container { height: 60vh; background: var(--card); border-radius: 25px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        #chat-stream { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrap { display: flex; align-items: flex-end; gap: 10px; max-width: 85%; }
        .msg-wrap.me { align-self: flex-start; }
        .msg-wrap.other { align-self: flex-end; flex-direction: row-reverse; }
        .msg-pfp { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; cursor: pointer; }
        .msg-txt { padding: 10px 14px; border-radius: 18px; font-size: 13px; line-height: 1.4; }
        .me .msg-txt { background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .other .msg-txt { background: #E2E8F0; color: #333; border-bottom-left-radius: 2px; }

        /* الشريط السفلي */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-btn { text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); font-weight: 700; }
        .nav-btn i { font-size: 22px; display: block; margin-bottom: 4px; }

        .modal-view { position: fixed; inset: 0; background: white; z-index: 6000; display: none; flex-direction: column; padding: 30px; animation: slideUp 0.4s ease; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(4px); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body id="appBody">

    <div id="onboarding">
        <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
        <h2 style="margin-bottom: 10px;">أهلاً بك في المنصة الجديدة 🚀</h2>
        <p style="font-size: 12px; color: gray; margin-bottom: 20px;">لقد قمنا بتحديث السيرفر ليكون أسرع وأخف</p>
        <input type="text" id="reg-user" class="in-box" placeholder="اسم المستخدم">
        <input type="text" id="reg-name" class="in-box" placeholder="الاسم الكامل">
        <input type="text" id="reg-uni" class="in-box" placeholder="الجامعة">
        <button class="btn-main" onclick="register()">بدء التجربة الآن 🎓</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div id="user-modal" class="modal-view">
        <i class="fas fa-arrow-right" onclick="closeUserModal()" style="font-size: 24px; cursor: pointer; color: var(--primary);"></i>
        <div style="text-align: center; margin-top: 30px;">
            <img id="v-pfp" src="" style="width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--primary); object-fit: cover;">
            <h2 id="v-name" style="margin: 10px 0;"></h2>
            <span id="v-user" style="color: var(--primary); font-weight: bold;"></span>
            <div style="margin-top: 25px; background: #f8fafc; padding: 20px; border-radius: 20px; text-align: right;">
                <b>الجامعة:</b> <span id="v-uni"></span><br>
                <b>المرحلة:</b> <span id="v-lvl">الأولى</span>
            </div>
            <button class="btn-main" style="margin-top: 20px;" onclick="alert('تم إرسال طلب صداقة سحابي')">إضافة صديق</button>
        </div>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="side-head">
            <img id="my-pfp-side" src="https://i.ibb.co/VvzKXY7/bot-avatar.png" class="side-pfp">
            <h3 id="my-name-side" style="margin: 10px 0 0;">مصطفى</h3>
            <span id="my-user-side" style="color: var(--primary); font-size: 12px; font-weight: bold;">@username</span>
        </div>
        <div style="margin-top:10px;">
            <div onclick="nav('edit')" style="padding:15px; cursor:pointer;"><i class="fas fa-user-edit"></i> تعديل البروفايل</div>
            <div onclick="toggleDark()" style="padding:15px; cursor:pointer;"><i class="fas fa-moon"></i> الوضع الليلي</div>
            <div onclick="window.open('https://t.me/M3y4_p')" style="padding:15px; cursor:pointer;"><i class="fas fa-paper-plane"></i> تواصل مع المطور</div>
            <div onclick="localStorage.clear(); location.reload();" style="padding:15px; color:red; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</div>
        </div>
    </div>

    <div id="home-page" class="page active" style="padding:0;">
        <div class="app-header">
            <i class="fas fa-bars menu-toggle" onclick="toggleSidebar()"></i>
            <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
            <h2 id="greet-name">مرحباً بك</h2>
        </div>
        <div style="padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            <div onclick="nav('chat')" style="background:white; padding:15px; border-radius:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.02);"><i class="fas fa-comments" style="color:#a855f7; font-size:24px;"></i><br><small>شات مباشر</small></div>
            <div onclick="nav('social')" style="background:white; padding:15px; border-radius:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.02);"><i class="fas fa-search" style="color:#2ecc71; font-size:24px;"></i><br><small>بحث</small></div>
            <div onclick="nav('subjects')" style="background:white; padding:15px; border-radius:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.02);"><i class="fas fa-book" style="color:var(--primary); font-size:24px;"></i><br><small>المواد</small></div>
        </div>
    </div>

    <div id="chat-page" class="page">
        <h2>💬 الدردشة العامة</h2>
        <div class="chat-container">
            <div id="chat-stream"></div>
            <div style="display:flex; padding:10px; background:#f1f5f9; gap:10px;">
                <input type="text" id="chat-in" class="in-box" style="margin:0;" placeholder="اكتب رسالة...">
                <button id="send-btn" onclick="sendMsg()" style="background:var(--primary); color:white; border:none; padding:0 20px; border-radius:12px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="social-page" class="page">
        <h2>🔍 ابحث عن زملائك</h2>
        <input type="text" class="in-box" id="user-search" placeholder="ابحث باليوزر أو الاسم..." oninput="liveSearch()">
        <div id="search-results"></div>
    </div>

    <div id="subjects-page" class="page">
        <h2>📂 مواد الفاينل</h2>
        <div id="files-list"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="nav('home')"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-btn" onclick="nav('chat')"><i class="fas fa-comment-dots"></i><span>شات</span></div>
        <div class="nav-btn" onclick="nav('social')"><i class="fas fa-users"></i><span>أصدقاء</span></div>
        <div class="nav-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i><span>المزيد</span></div>
    </div>

    <script>
        // --- الرابط الجديد الخاص بك ---
        const FB = "https://mmmmmm7-bc8e8-default-rtdb.firebaseio.com/";
        
        let user = JSON.parse(localStorage.getItem('userProfile'));
        let lastCount = 0;

        window.onload = () => {
            if(!user) { document.getElementById('onboarding').style.display = 'flex'; }
            else { 
                init(); 
                setInterval(syncChat, 5000); // تحديث كل 5 ثواني لتوفير الـ 10 جيجا
            }
        };

        async function register() {
            const u = document.getElementById('reg-user').value.toLowerCase().trim();
            const n = document.getElementById('reg-name').value.trim();
            const uni = document.getElementById('reg-uni').value.trim();
            if(u && n) {
                user = { id: Date.now(), username: u, name: n, university: uni, pfp: 'https://i.ibb.co/VvzKXY7/bot-avatar.png' };
                localStorage.setItem('userProfile', JSON.stringify(user));
                await fetch(FB + "users/" + user.id + ".json", { method: 'PUT', body: JSON.stringify(user) });
                location.reload();
            }
        }

        function init() {
            document.getElementById('greet-name').innerText = "مرحباً، " + user.name;
            document.getElementById('my-name-side').innerText = user.name;
            document.getElementById('my-user-side').innerText = "@" + user.username;
            document.getElementById('my-pfp-side').src = user.pfp;
            
            const list = document.getElementById('files-list');
            list.innerHTML = `<div style="background:white; padding:15px; border-radius:15px; display:flex; justify-content:space-between; margin-top:10px; border:1px solid #eee;">
                <div onclick="window.open('https://drive.google.com/file/d/1Vl9sP1Lh5oRS6Wrg-F5gJ9s7OQCRNIpl/view','_blank')"><b>📂 ملزمة النحو</b></div>
                <i class="fas fa-heart" style="color:#ddd;"></i>
            </div>`;
        }

        async function sendMsg() {
            const input = document.getElementById('chat-in');
            if(!input.value.trim()) return;
            const msg = { uid: user.id, name: user.name, pfp: user.pfp, text: input.value.trim(), time: Date.now() };
            input.value = "";
            await fetch(FB + "chat.json", { method: 'POST', body: JSON.stringify(msg) });
            syncChat();
        }

        async function syncChat() {
            try {
                const res = await fetch(FB + "chat.json");
                const data = await res.json();
                if(!data) return;
                const entries = Object.entries(data).sort((a,b)=>a[1].time - b[1].time);
                if(entries.length === lastCount) return;

                const stream = document.getElementById('chat-stream');
                const newItems = entries.slice(lastCount);
                newItems.forEach(([id, m]) => {
                    const type = m.uid === user.id ? 'me' : 'other';
                    stream.innerHTML += `<div class="msg ${type}"><img src="${m.pfp}" class="msg-pfp" onclick="viewU('${m.uid}')"><div class="msg-txt"><b>${m.name}:</b><br>${m.text}</div></div>`;
                });
                stream.scrollTop = stream.scrollHeight;
                lastCount = entries.length;
            } catch(e) {}
        }

        async function liveSearch() {
            const q = document.getElementById('user-search').value.toLowerCase().trim();
            const box = document.getElementById('search-results');
            if(q.length < 1) { box.innerHTML = ""; return; }
            
            const res = await fetch(FB + "users.json");
            const all = await res.json();
            box.innerHTML = "";
            for(let id in all) {
                const u = all[id];
                if(u.username.includes(q) || u.name.toLowerCase().includes(q)) {
                    box.innerHTML += `<div style="background:white; padding:12px; border-radius:12px; display:flex; align-items:center; justify-content:space-between; margin-top:10px; border:1px solid #eee;">
                        <div style="display:flex; align-items:center; gap:10px;"><img src="${u.pfp}" width="40" height="40" style="border-radius:50%;"><div style="text-align:right"><b>${u.name}</b><br><small>@${u.username}</small></div></div>
                        <button onclick="viewU('${u.id}')" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:8px; font-size:11px;">عرض</button>
                    </div>`;
                }
            }
        }

        async function viewU(uid) {
            const res = await fetch(FB + "users/" + uid + ".json");
            const u = await res.json();
            document.getElementById('v-pfp').src = u.pfp;
            document.getElementById('v-name').innerText = u.name;
            document.getElementById('v-user').innerText = "@" + u.username;
            document.getElementById('v-uni').innerText = u.university;
            document.getElementById('user-modal').style.display = "flex";
        }

        function closeUserModal() { document.getElementById('user-modal').style.display = "none"; }
        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById(p + '-page').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            toggleSidebar(true);
        }
        function toggleSidebar(c=false) {
            const s = document.getElementById('sidebar'), o = document.getElementById('overlay');
            if(c) { s.classList.remove('active'); o.style.display="none"; return; }
            s.classList.toggle('active'); o.style.display = s.classList.contains('active')?"block":"none";
        }
        function toggleDark() { document.body.classList.toggle('dark'); }
    </script>
</body>
</html>
