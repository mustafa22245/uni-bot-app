<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المساعد الأكاديمي 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --header-grad: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%);
            --border: #E2E8F0; --gray: #94A3B8;
        }

        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8;
            --header-grad: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }

        /* شاشة التسجيل */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); font-family: 'Cairo'; background: #f9f9f9; }
        .login-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* القائمة الجانبية */
        .sidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 320px; height: 100%; background: var(--card); z-index: 2000; transition: 0.4s; box-shadow: -10px 0 30px rgba(0,0,0,0.1); padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .side-user-box { text-align: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .side-pfp { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 10px; }
        .side-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 5px; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .side-item:hover { background: rgba(77, 149, 255, 0.1); }
        .side-item i { color: var(--primary); width: 25px; }

        /* الهيدر */
        .app-header { background: var(--header-grad); padding: 50px 20px 30px; text-align: center; position: relative; }
        .menu-icon { position: absolute; right: 20px; top: 25px; font-size: 24px; cursor: pointer; }
        .app-logo { width: 85px; height: 85px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .app-logo img { width: 100%; height: 100%; object-fit: cover; }

        /* الصفحات */
        .page { display: none; padding: 20px 20px 120px; animation: fadeIn 0.4s; box-sizing: border-box; min-height: 100vh; }
        .page.active { display: block; }

        /* تعديل الملف الشخصي */
        .edit-pfp-area { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; }
        .edit-pfp-area img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .upload-icon { position: absolute; bottom: 0; right: 0; background: var(--primary); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; }

        /* البحث عن أصدقاء */
        .user-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-pfp-sm { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }

        /* الشريط السفلي */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); font-weight: 700; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(4px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
        <h2 style="margin-bottom: 20px;">مرحباً بك في المنصة</h2>
        <input type="text" id="reg-user" class="login-input" placeholder="اسم المستخدم (Username)">
        <input type="text" id="reg-name" class="login-input" placeholder="الاسم الحقيقي">
        <input type="text" id="reg-uni" class="login-input" placeholder="الجامعة / الكلية">
        <button class="login-btn" onclick="saveProfile()">إنشاء الحساب 🚀</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSide()"></div>

    <div id="sidebar" class="sidebar">
        <div class="side-user-box">
            <img id="side-pfp" src="https://i.ibb.co/VvzKXY7/bot-avatar.png" class="side-pfp">
            <h3 id="side-name" style="margin:0;">تحميل...</h3>
            <span id="side-username" style="color:var(--primary); font-size:12px;">@username</span>
        </div>
        <div class="side-item" onclick="nav('edit-profile')"><span><i class="fas fa-user-edit"></i> تعديل الملف الشخصي</span> <i class="fas fa-chevron-left"></i></div>
        <div class="side-item" onclick="toggleDark()"><span><i class="fas fa-moon"></i> الوضع الليلي</span></div>
        <div class="side-item"><span><i class="fas fa-bell"></i> الإشعارات</span></div>
        <div class="side-item" onclick="window.open('https://t.me/M3y4_p', '_blank')"><span><i class="fas fa-info-circle"></i> من نحن (تليجرام)</span></div>
        <div class="side-item" style="color:#ef4444; margin-top:20px;" onclick="logout()"><span><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</span></div>
    </div>

    <div id="home-page" class="page active" style="padding:0;">
        <div class="app-header">
            <i class="fas fa-bars menu-icon" onclick="toggleSide()"></i>
            <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
            <h2 id="welcome-txt">مرحباً بك</h2>
            <p style="font-size: 11px;">تطبيقك الاجتماعي التعليمي المتكامل</p>
        </div>

        <div style="padding: 20px;">
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                <div onclick="nav('subjects')" style="background: white; padding: 25px 15px; text-align: center; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                    <i class="fas fa-book-reader" style="color: var(--primary); font-size: 30px;"></i><br><b>المواد الدراسية</b>
                </div>
                <div onclick="nav('social')" style="background: white; padding: 25px 15px; text-align: center; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                    <i class="fas fa-search-plus" style="color: #2ecc71; font-size: 30px;"></i><br><b>بحث عن أصدقاء</b>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-profile-page" class="page">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
            <i class="fas fa-arrow-right" onclick="nav('home')" style="font-size:20px;"></i>
            <h2 style="margin:0;">تعديل الملف الشخصي</h2>
        </div>
        
        <div class="edit-pfp-area">
            <img id="edit-pfp-view" src="https://i.ibb.co/VvzKXY7/bot-avatar.png">
            <label for="pfp-upload" class="upload-icon"><i class="fas fa-camera"></i></label>
            <input type="file" id="pfp-upload" style="display:none;" accept="image/*" onchange="uploadPhoto(this)">
        </div>

        <input type="text" id="edit-name" class="login-input" placeholder="الاسم الجديد">
        <input type="text" id="edit-uni" class="login-input" placeholder="الجامعة">
        <input type="text" id="edit-level" class="login-input" placeholder="المرحلة الدراسية">
        <button class="login-btn" onclick="updateProfile()">حفظ التغييرات ✅</button>
    </div>

    <div id="social-page" class="page">
        <h2>🔍 ابحث عن زملائك</h2>
        <input type="text" class="login-input" id="userSearch" placeholder="ادخل اسم المستخدم أو الاسم الحقيقي..." oninput="searchUsers()">
        <div id="search-results" style="margin-top: 20px;"></div>
    </div>

    <div id="subjects-page" class="page">
        <h2>📂 مواد الفاينل</h2>
        <div id="subjects-list"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('home')"><i class="fas fa-home"></i>الرئيسية</div>
        <div class="nav-item" onclick="nav('subjects')"><i class="fas fa-star"></i>المفضلة</div>
        <div class="nav-item" onclick="nav('social')"><i class="fas fa-user-friends"></i>أصدقاء</div>
        <div class="nav-item" onclick="toggleSide()"><i class="fas fa-bars"></i>المزيد</div>
    </div>

    <script>
        const DB_URL = "https://hillah-app-default-rtdb.firebaseio.com/";
        let currentUser = JSON.parse(localStorage.getItem('userProfile'));

        window.onload = function() {
            if(!currentUser) {
                document.getElementById('login-screen').style.display = 'flex';
            } else {
                updateSidebarUI();
                nav('home');
            }
        };

        // حفظ البيانات لأول مرة
        async function saveProfile() {
            const username = document.getElementById('reg-user').value.toLowerCase();
            const name = document.getElementById('reg-name').value;
            const uni = document.getElementById('reg-uni').value;

            if(username && name) {
                const profile = { username, name, uni, level: 'غير محدد', pfp: 'https://i.ibb.co/VvzKXY7/bot-avatar.png', id: Date.now() };
                localStorage.setItem('userProfile', JSON.stringify(profile));
                await fetch(DB_URL + "users/" + profile.id + ".json", { method: 'PUT', body: JSON.stringify(profile) });
                location.reload();
            } else { alert("يرجى إكمال البيانات الأساسية"); }
        }

        // تحديث الواجهة والبروفايل
        function updateSidebarUI() {
            document.getElementById('side-name').innerText = currentUser.name;
            document.getElementById('side-username').innerText = "@" + currentUser.username;
            document.getElementById('side-pfp').src = currentUser.pfp;
            document.getElementById('welcome-txt').innerText = "مرحباً، " + currentUser.name;
            
            // تعبئة حقول التعديل تلقائياً
            document.getElementById('edit-name').value = currentUser.name;
            document.getElementById('edit-uni').value = currentUser.uni;
            document.getElementById('edit-level').value = currentUser.level;
            document.getElementById('edit-pfp-view').src = currentUser.pfp;
        }

        // رفع الصورة
        function uploadPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('edit-pfp-view').src = e.target.result;
                    currentUser.pfp = e.target.result; // سنخزنها Base64 مؤقتاً
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // حفظ التعديلات
        async function updateProfile() {
            currentUser.name = document.getElementById('edit-name').value;
            currentUser.uni = document.getElementById('edit-uni').value;
            currentUser.level = document.getElementById('edit-level').value;

            localStorage.setItem('userProfile', JSON.stringify(currentUser));
            await fetch(DB_URL + "users/" + currentUser.id + ".json", { method: 'PATCH', body: JSON.stringify(currentUser) });
            alert("تم تحديث البروفايل بنجاح! ✨");
            location.reload();
        }

        // البحث عن مستخدمين
        async function searchUsers() {
            const query = document.getElementById('userSearch').value.toLowerCase();
            const resultsBox = document.getElementById('search-results');
            if(query.length < 2) return;

            const res = await fetch(DB_URL + "users.json");
            const allUsers = await res.json();
            resultsBox.innerHTML = "";

            for(let id in allUsers) {
                const u = allUsers[id];
                if(u.username.includes(query) || u.name.toLowerCase().includes(query)) {
                    resultsBox.innerHTML += `
                        <div class="user-card">
                            <div class="user-info">
                                <img src="${u.pfp}" class="user-pfp-sm">
                                <div>
                                    <b>${u.name}</b><br>
                                    <small style="color:var(--primary);">@${u.username}</small>
                                </div>
                            </div>
                            <button class="login-btn" style="width:auto; padding:5px 15px; font-size:12px;" onclick="addFriend('${u.id}')">إضافة</button>
                        </div>`;
                }
            }
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById(p + '-page').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            toggleSide(true);
        }

        function toggleSide(close = false) {
            const s = document.getElementById('sidebar'), o = document.getElementById('overlay');
            if(close) { s.classList.remove('active'); o.style.display="none"; return; }
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? "block" : "none";
        }

        function toggleDark() { document.body.classList.toggle('dark'); }
        function logout() { localStorage.clear(); location.reload(); }

    </script>
</body>
</html>
