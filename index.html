<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المساعد الأكاديمي 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --header-grad: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%);
            --border: #E2E8F0; --gray: #94A3B8;
        }

        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8;
            --header-grad: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; overflow-x: hidden; }

        /* Sidebar */
        .sidebar { position: fixed; right: -100%; top: 0; width: 80%; max-width: 300px; height: 100%; background: var(--card); z-index: 2000; transition: 0.4s; box-shadow: -10px 0 30px rgba(0,0,0,0.1); padding: 25px; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        .side-profile { text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        .side-profile img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); }
        .side-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 600; color: var(--text); }
        .side-item:hover { background: rgba(77, 149, 255, 0.1); }

        /* Header */
        .app-header { background: var(--header-grad); padding: 50px 20px 30px; text-align: center; position: relative; }
        .menu-icon { position: absolute; right: 20px; top: 25px; font-size: 24px; cursor: pointer; }
        .app-logo { width: 90px; height: 90px; background: white; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .app-logo img { width: 100%; height: 100%; object-fit: cover; }

        /* Pages & Content */
        .page { display: none; padding: 20px 20px 100px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        .main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .card-btn { background: var(--card); border-radius: 15px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); cursor: pointer; font-size: 11px; font-weight: 700; }
        .card-btn i { font-size: 24px; margin-bottom: 8px; display: block; color: var(--primary); }

        /* File Cards */
        .section-title { color: var(--primary); border-right: 4px solid var(--primary); padding-right: 10px; margin: 25px 0 10px; }
        .file-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
        .file-info { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .download-btn { background: #2ecc71; color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 12px; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); font-weight: 700; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }

        /* Admin Page (Hidden) */
        .admin-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--card); z-index: 3000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); font-family: 'Cairo'; }
        .admin-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; }
        iframe { width: 100%; height: 80vh; border: none; border-radius: 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleSide()"></div>

    <div id="sidebar" class="sidebar">
        <div class="side-profile">
            <img src="https://i.ibb.co/VvzKXY7/bot-avatar.png">
            <h3 style="margin:10px 0 5px;">مصطفى مهند</h3>
            <span style="color:var(--primary); font-size:12px; font-weight:bold;">@M3y4_p</span>
        </div>
        <div class="side-item" onclick="accessAdmin()"><i class="fas fa-user-shield"></i> لوحة التحكم الكبرى</div>
        <div class="side-item" onclick="toggleDark()"><i class="fas fa-moon"></i> الوضع الليلي</div>
        <div class="side-item" style="color:#ef4444;" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</div>
    </div>

    <div id="home-page" class="page active" style="padding:0;">
        <div class="app-header">
            <i class="fas fa-bars menu-icon" onclick="toggleSide()"></i>
            <div class="app-logo"><img src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
            <h2>المساعد الأكاديمي</h2>
            <p style="font-size:12px; opacity:0.8;">جميع ملازمك في مكان واحد وبأقل مساحة ☁️</p>
        </div>

        <div style="padding: 20px;">
            <div class="main-grid">
                <div class="card-btn" onclick="nav('subjects')"><i class="fas fa-folder"></i>الأقسام</div>
                <div class="card-btn"><i class="fas fa-clock"></i>العد التنازلي</div>
                <div class="card-btn"><i class="fas fa-stopwatch"></i>منبهاتي</div>
                <div class="card-btn" onclick="nav('translate')"><i class="fas fa-language"></i>الترجمة</div>
                <div class="card-btn"><i class="fas fa-gamepad"></i>ترفيه</div>
                <div class="card-btn"><i class="fas fa-lightbulb"></i>نصائح</div>
            </div>

            <div id="quick-access">
                </div>
        </div>
    </div>

    <div id="subjects-page" class="page">
        <h2 class="section-title">الأقسام والمواد</h2>
        <div id="subjects-list"></div>
        <button class="admin-btn" style="margin-top:20px;" onclick="nav('home')">العودة للرئيسية</button>
    </div>

    <div id="translate-page" class="page">
        <h2 class="section-title">الترجمة الفورية</h2>
        <iframe src="https://translate.google.com/?sl=en&tl=ar&op=translate"></iframe>
        <button class="admin-btn" style="margin-top:20px;" onclick="nav('home')">إغلاق المترجم</button>
    </div>

    <div id="admin-page" class="admin-page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0;">🛠 لوحة التحكم</h2>
            <i class="fas fa-times" onclick="closeAdmin()" style="font-size:24px; cursor:pointer;"></i>
        </div>
        <input type="text" id="admSub" class="admin-input" placeholder="اسم القسم">
        <input type="text" id="admName" class="admin-input" placeholder="اسم الملزمة">
        <input type="text" id="admUrl" class="admin-input" placeholder="رابط Google Drive">
        <button class="admin-btn" onclick="addFromAdmin()">إضافة للسحابة</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('home')"><i class="fas fa-home"></i>الرئيسية</div>
        <div class="nav-item"><i class="fas fa-heart"></i>المفضلة</div>
        <div class="nav-item"><i class="fas fa-history"></i>المحفوظات</div>
        <div class="nav-item" onclick="toggleSide()"><i class="fas fa-bars"></i>المزيد</div>
    </div>

    <script>
        const DB_URL = "https://hillah-app-default-rtdb.firebaseio.com/.json";
        
        let appData = { subjects: [] };

        async function load() {
            try {
                const r = await fetch(DB_URL + "?t=" + Date.now());
                const d = await r.json();
                if(d) appData = d;
                render();
            } catch(e) { console.log("Offline"); }
        }

        function render() {
            const list = document.getElementById('subjects-list');
            const quick = document.getElementById('quick-access');
            list.innerHTML = ""; quick.innerHTML = "";

            (appData.subjects || []).forEach(sub => {
                let html = `<h4 class="section-title">📂 ${sub.name}</h4>`;
                sub.files.forEach(f => {
                    const card = `
                        <div class="file-card">
                            <div class="file-info" onclick="window.open('${f.url.replace('/view', '/preview')}','_blank')">
                                <i class="fas fa-file-pdf" style="color:#ef4444; font-size:20px;"></i>
                                <div style="margin-right:10px;"><b>${f.name}</b></div>
                            </div>
                            <button class="download-btn" onclick="window.location.href='${f.url.replace('/view', '/uc?export=download&id=')}'">تنزيل</button>
                        </div>`;
                    html += card;
                    quick.innerHTML += card;
                });
                list.innerHTML += html;
            });
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById(p + '-page').classList.add('active');
            toggleSide(true);
        }

        function toggleSide(close = false) {
            const s = document.getElementById('sidebar'), o = document.getElementById('overlay');
            if(close) { s.classList.remove('active'); o.style.display="none"; return; }
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? "block" : "none";
        }

        function accessAdmin() {
            if(prompt("أدخل الرمز السري:") === "2004@@##mklL") document.getElementById('admin-page').style.display="block";
        }

        function closeAdmin() { document.getElementById('admin-page').style.display="none"; }

        async function addFromAdmin() {
            const s = document.getElementById('admSub').value, n = document.getElementById('admName').value, u = document.getElementById('admUrl').value;
            if(!s || !n || !u) return alert("املأ الحقول!");
            let target = appData.subjects.find(x => x.name === s);
            if(!target) { target = {name:s, files:[]}; appData.subjects.push(target); }
            target.files.push({name:n, url:u});
            await fetch(DB_URL, {method:'PUT', body: JSON.stringify(appData)});
            alert("تم بنجاح!");
            load(); closeAdmin();
        }

        function toggleDark() { document.body.classList.toggle('dark'); }

        load();
    </script>
</body>
</html>
