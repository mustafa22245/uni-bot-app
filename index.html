<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المساعد الأكاديمي v32 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --header-grad: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%);
            --border: #E2E8F0; --gray: #94A3B8; --red: #EF4444;
        }
        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8; --border: #334155;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }

        /* شاشة الدخول */
        #gate-scr { position: fixed; inset: 0; background: white; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .form-scr { display: none; width: 100%; max-width: 400px; animation: fadeIn 0.4s; }
        .input-group { width: 100%; margin-bottom: 12px; }
        .input-group input { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid var(--border); font-family: Cairo; background: #f8fafc; color: #333; }

        /* القائمة الجانبية */
        .sidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 310px; height: 100%; background: var(--card); z-index: 2000; transition: 0.4s ease; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(4px); }

        /* الصفحات */
        .page { display: none; min-height: 100vh; animation: fadeIn 0.4s; padding: 20px 20px 120px; }
        .page.active { display: block; }

        /* الشات */
        .chat-view { height: 60vh; background: var(--card); border-radius: 25px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        #chat-stream, #p-chat-stream { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrap { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .me { align-self: flex-start; } .other { align-self: flex-end; flex-direction: row-reverse; }
        .msg-txt { padding: 10px 14px; border-radius: 15px; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .me .msg-txt { background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .other .msg-txt { background: #E2E8F0; color: #333; border-bottom-left-radius: 2px; }

        /* الشريط السفلي والاشعارات */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-link { text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; position: relative; }
        .nav-link.active { color: var(--primary); font-weight: 700; }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
        .badge { position: absolute; top: -2px; right: 28%; width: 10px; height: 10px; background: var(--red); border-radius: 50%; border: 2px solid var(--card); display: none; }

        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        #custom-dialog { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .dialog-box { background: var(--card); width: 85%; max-width: 350px; border-radius: 25px; padding: 25px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body id="appBody">

    <div id="gate-scr">
        <div id="gate-choice" style="width:100%; max-width:400px;">
            <i class="fas fa-graduation-cap" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>المساعد الأكاديمي 🎓</h2>
            <button class="btn-main" onclick="showForm('login')">لدي حساب</button>
            <button class="btn-main" style="background:#E2E8F0; color:#333; margin-top:10px;" onclick="showForm('reg')">إنشاء حساب جديد</button>
        </div>
        <div id="login-form" class="form-scr">
            <h3>تسجيل الدخول</h3>
            <div class="input-group"><input type="text" id="l-user" placeholder="اسم المستخدم"></div>
            <div class="input-group"><input type="password" id="l-pass" placeholder="كلمة المرور"></div>
            <button class="btn-main" onclick="handleLogin()">دخول 🚀</button>
            <p onclick="showForm('gate')" style="margin-top:15px; color:var(--primary); cursor:pointer;">رجوع</p>
        </div>
        <div id="reg-form" class="form-scr">
            <h3>إنشاء حساب جديد</h3>
            <div class="input-group"><input type="text" id="r-user" placeholder="اليوزر (Username)"></div>
            <div class="input-group"><input type="text" id="r-name" placeholder="الاسم الكامل"></div>
            <div class="input-group"><input type="password" id="r-pass" placeholder="كلمة المرور"></div>
            <button class="btn-main" onclick="handleRegister()">تأكيد التسجيل ✨</button>
            <p onclick="showForm('gate')" style="margin-top:15px; color:var(--primary); cursor:pointer;">رجوع</p>
        </div>
    </div>

    <div id="custom-dialog">
        <div class="dialog-box">
            <h3 id="dialog-title">تنبيه</h3>
            <p id="dialog-msg"></p>
            <button class="btn-main" onclick="closeDialog()">موافق</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="sidebar">
        <div style="text-align:center; border-bottom:1px solid #eee; padding-bottom:20px; margin-bottom:20px;">
            <img id="side-pfp" src="" style="width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover;">
            <h3 id="side-name" style="margin: 10px 0 0;">...</h3>
        </div>
        <div onclick="nav('notifications')" style="padding:15px; cursor:pointer; font-weight:bold;"><i class="fas fa-bell"></i> الإشعارات والطلبات</div>
        <div onclick="nav('edit')" style="padding:15px; cursor:pointer; font-weight:bold;"><i class="fas fa-user-edit"></i> تعديل البروفايل</div>
        <div onclick="toggleDark()" style="padding:15px; cursor:pointer; font-weight:bold;"><i class="fas fa-moon"></i> الوضع الليلي</div>
        <div onclick="logout()" style="padding:15px; color:red; cursor:pointer; font-weight:bold;"><i class="fas fa-power-off"></i> تسجيل الخروج</div>
    </div>

    <div id="home-page" class="page active" style="padding:0;">
        <div style="background:var(--header-grad); padding:50px 20px 30px; text-align:center; position:relative;">
            <i class="fas fa-bars" onclick="toggleSidebar()" style="position:absolute; right:20px; top:25px; font-size:24px; cursor:pointer;"></i>
            <h2>الرئيسية</h2>
            <p id="hi-user">أهلاً بك</p>
        </div>
        <div style="padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div onclick="nav('chat')" style="background:var(--card); padding:25px; border-radius:20px; text-align:center; border:1px solid var(--border);"><i class="fas fa-globe" style="font-size:30px; color:#a855f7;"></i><br><b>شات عام</b></div>
            <div onclick="nav('p-list')" style="background:var(--card); padding:25px; border-radius:20px; text-align:center; border:1px solid var(--border);"><i class="fas fa-comment-dots" style="font-size:30px; color:#4D95FF;"></i><br><b>خاص</b></div>
        </div>
    </div>

    <div id="notifications-page" class="page">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
            <i class="fas fa-arrow-right" onclick="nav('home')" style="font-size:20px; cursor:pointer;"></i>
            <h2>🔔 طلبات الصداقة</h2>
        </div>
        <div id="requests-box"></div>
    </div>

    <div id="chat-page" class="page"><h2>💬 الشات العام</h2><div class="chat-view"><div id="chat-stream"></div><div style="display:flex; padding:10px; gap:8px;"><input type="text" id="chat-in" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;"><button onclick="sendGlobal()">إرسال</button></div></div></div>
    <div id="p-list-page" class="page"><h2>📩 محادثاتي الخاصة</h2><div id="active-chats-box"></div></div>
    <div id="social-page" class="page"><h2>🔍 بحث زملاء</h2><input type="text" id="s-input" class="input-group" placeholder="يوزر..." oninput="searchUsers()"><div id="s-results" style="margin-top:20px;"></div></div>
    <div id="friends-page" class="page"><h2>👥 أصدقائي</h2><div id="friends-list-box"></div></div>

    <div class="nav-bar">
        <div class="nav-link active" onclick="nav('home')"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-link" onclick="nav('social')"><i class="fas fa-search"></i><span>بحث</span></div>
        <div class="nav-link" onclick="nav('p-list')"><div id="msg-badge" class="badge"></div><i class="fas fa-comment-dots"></i><span>الخاص</span></div>
        <div class="nav-link" onclick="nav('friends')"><div id="req-badge" class="badge"></div><i class="fas fa-user-friends"></i><span>الأصدقاء</span></div>
    </div>

    <script>
        const FB = "https://mmmmmm7-bc8e8-default-rtdb.firebaseio.com/";
        let me = JSON.parse(localStorage.getItem('userProfile'));
        let lastGCount = 0;

        window.onload = () => {
            if(!me) { document.getElementById('gate-scr').style.display='flex'; showForm('gate'); }
            else { initUI(); setInterval(syncGlobal, 5000); setInterval(checkNotifications, 4000); }
        };

        function initUI() {
            document.getElementById('hi-user').innerText = "أهلاً بك يا " + me.name;
            document.getElementById('side-name').innerText = me.name;
            document.getElementById('side-pfp').src = me.pfp || 'https://i.ibb.co/VvzKXY7/bot-avatar.png';
            loadFriends();
            checkNotifications(); // فحص أولي
        }

        // --- نظام الإشعارات (FIXED) ---
        async function checkNotifications() {
            try {
                const res = await fetch(FB + "requests/" + me.id + ".json");
                const data = await res.json();
                
                // تحديث النقطة الحمراء
                const hasRequests = data && Object.keys(data).length > 0;
                document.getElementById('req-badge').style.display = hasRequests ? 'block' : 'none';

                // إذا كنا في صفحة الإشعارات، نحدث القائمة فوراً
                if(document.getElementById('notifications-page').style.display === 'block') {
                    renderRequests(data);
                }
            } catch(e) {}
        }

        function renderRequests(data) {
            const box = document.getElementById('requests-box');
            box.innerHTML = "";
            if(!data || Object.keys(data).length === 0) {
                box.innerHTML = "<p style='text-align:center; margin-top:50px; color:gray;'>لا توجد طلبات جديدة حالياً.</p>";
                return;
            }
            Object.entries(data).forEach(([id, r]) => {
                box.innerHTML += `
                    <div style="background:white; padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; border:1px solid #eee; margin-top:10px;">
                        <div><b>${r.name}</b><br><small>أرسل لك طلب صداقة</small></div>
                        <div style="display:flex; gap:8px;">
                            <button onclick="accept('${id}', '${r.name}')" style="background:#2ecc71; color:white; border:none; padding:8px 15px; border-radius:10px;">قبول ✅</button>
                            <button onclick="ignore('${id}')" style="background:#ddd; color:#333; border:none; padding:8px 15px; border-radius:10px;">تجاهل</button>
                        </div>
                    </div>`;
            });
        }

        async function accept(id, name) {
            await fetch(FB + `friends/${me.id}/${id}.json`, { method: 'PUT', body: JSON.stringify({name: name}) });
            await fetch(FB + `friends/${id}/${me.id}.json`, { method: 'PUT', body: JSON.stringify({name: me.name}) });
            await fetch(FB + `requests/${me.id}/${id}.json`, { method: 'DELETE' });
            showAppAlert("نجاح", "تم قبول الصداقة بنجاح!");
            checkNotifications(); loadFriends();
        }

        async function ignore(id) {
            await fetch(FB + `requests/${me.id}/${id}.json`, { method: 'DELETE' });
            checkNotifications();
        }

        // --- الميزات الأساسية ---
        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById(p + '-page').classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            const idx = {home:0, social:1, 'p-list':2, friends:3}[p];
            if(idx !== undefined) document.querySelectorAll('.nav-link')[idx].classList.add('active');
            if(p === 'notifications') checkNotifications(); // تحديث فوري عند الدخول
            if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        }

        async function searchUsers() {
            const q = document.getElementById('s-input').value.toLowerCase().trim();
            const resBox = document.getElementById('s-results');
            if(q.length < 1) { resBox.innerHTML = ""; return; }
            const res = await fetch(FB + "users.json");
            const all = await res.json();
            resBox.innerHTML = "";
            Object.values(all || {}).forEach(u => {
                if(u.id != me.id && (u.username.includes(q) || u.name.toLowerCase().includes(q))) {
                    resBox.innerHTML += `<div style="background:white; padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; border:1px solid #eee; margin-top:10px;">
                        <div><b>${u.name}</b><br><small>@${u.username}</small></div>
                        <button onclick="sendReq('${u.id}')" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:10px;">إضافة</button>
                    </div>`;
                }
            });
        }

        async function sendReq(targetId) {
            await fetch(FB + `requests/${targetId}/${me.id}.json`, { method: 'PUT', body: JSON.stringify({ name: me.name }) });
            showAppAlert("تم الإرسال", "سيتلقى الطرف الآخر إشعاراً بطلبك.");
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar'), o = document.getElementById('overlay');
            s.classList.toggle('active');
            o.style.display = s.classList.contains('active') ? 'block' : 'none';
        }

        function showForm(t) {
            document.getElementById('gate-choice').style.display = t==='gate'?'block':'none';
            document.getElementById('login-form').style.display = t==='login'?'block':'none';
            document.getElementById('reg-form').style.display = t==='reg'?'block':'none';
        }

        async function handleLogin() {
            const u = document.getElementById('l-user').value.toLowerCase().trim();
            const p = document.getElementById('l-pass').value;
            const res = await fetch(FB + "users.json");
            const all = await res.json();
            let found = Object.values(all || {}).find(x => x.username === u && x.password === p);
            if(found) { localStorage.setItem('userProfile', JSON.stringify(found)); location.reload(); }
            else showAppAlert("خطأ", "بيانات الدخول غير صحيحة");
        }

        async function handleRegister() {
            const u = document.getElementById('r-user').value.toLowerCase().trim();
            const n = document.getElementById('r-name').value.trim();
            const p = document.getElementById('r-pass').value;
            if(!u || !n || !p) return showAppAlert("خطأ", "أكمل البيانات الأساسية");
            const newUser = { id: Date.now(), username: u, name: n, password: p, pfp: 'https://i.ibb.co/VvzKXY7/bot-avatar.png' };
            await fetch(FB + "users/" + newUser.id + ".json", { method: 'PUT', body: JSON.stringify(newUser) });
            localStorage.setItem('userProfile', JSON.stringify(newUser));
            location.reload();
        }

        function showAppAlert(t, m) { document.getElementById('dialog-title').innerText=t; document.getElementById('dialog-msg').innerText=m; document.getElementById('custom-dialog').style.display='flex'; }
        function closeDialog() { document.getElementById('custom-dialog').style.display='none'; }
        function toggleDark() { document.body.classList.toggle('dark'); }
        function logout() { localStorage.clear(); location.reload(); }
        async function loadFriends() { /* كود تحميل الأصدقاء */ }
        async function syncGlobal() { /* كود الشات العام */ }
    </script>
</body>
</html>
