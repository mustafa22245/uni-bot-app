<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المساعد الأكاديمي</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{
    font-family: sans-serif;
    margin:0;
    background:#f5f5f5;
}

/* header */
.header{
    background:#4D95FF;
    color:white;
    padding:20px;
    text-align:center;
}

/* pages */
.page{display:none;padding:15px;}
.page.active{display:block}

/* cards */
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
}

/* nav */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px;
    border-top:1px solid #ddd;
}
.nav div{cursor:pointer}
</style>
</head>

<body>

<div class="header">
    <h2>المساعد الأكاديمي</h2>
</div>

<!-- الصفحة الرئيسية -->
<div id="home" class="page active">
    <div class="card" onclick="nav('subjects')">📂 الأقسام</div>
    <div class="card">⭐ المفضلة</div>
</div>

<!-- صفحة الأقسام -->
<div id="subjects" class="page">
    <h3>الأقسام</h3>
    <div id="subjectsList"></div>
</div>

<!-- النافبار -->
<div class="nav">
    <div onclick="nav('home')">🏠</div>
    <div onclick="nav('subjects')">📂</div>
</div>

<script>
const DB_URL = "https://hillah-app-default-rtdb.firebaseio.com/.json";

let appData = {subjects:[]};

async function load(){
    const r = await fetch(DB_URL);
    const d = await r.json();
    if(d) appData = d;
    render();
}

function render(){
    const list = document.getElementById('subjectsList');
    list.innerHTML = "";

    (appData.subjects || []).forEach(s=>{
        list.innerHTML += `<div class="card">${s.name}</div>`;
    });
}

function nav(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

load();
</script>

</body>
</html>
