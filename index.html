<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المساعد الأكاديمي</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
--bg:#F0F4F8;
--card:#fff;
--text:#1E293B;
--primary:#4D95FF;
}
body.dark{
--bg:#0F172A;
--card:#1E293B;
--text:#fff;
}
body{margin:0;font-family:Cairo;background:var(--bg);color:var(--text);}

/* HEADER */
.header{
text-align:center;
padding:40px 20px;
}
.logo{
width:100px;height:100px;border-radius:50%;overflow:hidden;margin:auto;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}
.logo img{width:100%;height:100%}

/* SEARCH */
.search{
margin:10px;
background:#fff;
padding:10px;
border-radius:12px;
display:flex;
}
.search input{border:none;flex:1;outline:none}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}
.card{
background:var(--card);
padding:15px;
border-radius:15px;
text-align:center;
cursor:pointer;
}

/* LIST */
.item{
background:var(--card);
padding:12px;
margin:5px;
border-radius:12px;
display:flex;
justify-content:space-between;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:var(--card);
padding:10px;
justify-content:space-around;
}

/* SIDEBAR */
.sidebar{
position:fixed;
right:-100%;
top:0;
width:260px;
height:100%;
background:var(--card);
transition:.3s;
padding:20px;
}
.sidebar.active{right:0}

/* ADMIN */
.admin{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#fff;
display:none;
padding:20px;
overflow:auto;
}
input,button{width:100%;margin:5px;padding:10px}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<h3>👤 مصطفى مهند</h3>
<div onclick="openAdmin()">🛠 لوحة التحكم</div>
<div onclick="toggleDark()">🌙 الوضع الليلي</div>
<div>🔔 الإشعارات</div>
<div>🌐 اللغة</div>
<div onclick="location.reload()">🚪 خروج</div>
</div>

<!-- HOME -->
<div id="home">
<div class="header" onclick="toggleSide()">
<div class="logo"><img id="logo" src="https://i.ibb.co/VvzKXY7/bot-avatar.png"></div>
<h2 id="title">المساعد الأكاديمي</h2>
</div>

<div class="search">
<input placeholder="بحث..." oninput="search(this.value)">
</div>

<div class="grid">
<div class="card" onclick="nav('subjects')">📂 الأقسام</div>
<div class="card">⏱ العد</div>
<div class="card">⏰ منبه</div>
<div class="card">💡 نصائح</div>
<div class="card">🎮 ترفيه</div>
<div class="card">🌐 ترجمة</div>
</div>
</div>

<!-- SUBJECTS -->
<div id="subjects" style="display:none"></div>

<!-- FAV -->
<div id="fav" style="display:none"></div>

<!-- RECENT -->
<div id="recent" style="display:none"></div>

<!-- SEARCH -->
<div id="more" style="display:none"></div>

<!-- ADMIN -->
<div id="admin" class="admin">
<h2>لوحة التحكم</h2>

<input id="sub" placeholder="اسم القسم">
<button onclick="addSub()">إضافة قسم</button>

<input id="file" placeholder="اسم الملف">
<input id="url" placeholder="الرابط">
<button onclick="addFile()">إضافة ملف</button>

<input id="newTitle" placeholder="اسم التطبيق">
<input id="newLogo" placeholder="الصورة">
<button onclick="updateApp()">تحديث</button>

<button onclick="closeAdmin()">إغلاق</button>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="nav('home')">🏠</div>
<div onclick="nav('fav')">⭐</div>
<div onclick="nav('recent')">🕒</div>
<div onclick="nav('more')">🔍</div>
</div>

<script>
const DB_URL="https://hillah-app-default-rtdb.firebaseio.com/.json"
let data={subjects:[],config:{title:"المساعد الأكاديمي",logo:""}}
let favs=JSON.parse(localStorage.getItem("favs"))||[]
let rec=JSON.parse(localStorage.getItem("rec"))||[]

async function load(){
let r=await fetch(DB_URL)
let d=await r.json()
if(d) data=d
render()
}
function save(){
fetch(DB_URL,{method:"PUT",body:JSON.stringify(data)})
}

function render(){
document.getElementById("title").innerText=data.config.title
document.getElementById("logo").src=data.config.logo

let s=document.getElementById("subjects")
s.innerHTML=""
data.subjects.forEach(sub=>{
s.innerHTML+=`<h3>${sub.name}</h3>`
sub.files?.forEach(f=>{
s.innerHTML+=`
<div class="item" onclick="openFile('${f.name}','${f.url}')">
${f.name}
<span onclick="fav('${f.url}',event)">⭐</span>
</div>`
})
})
}

/* NAV */
function nav(p){
["home","subjects","fav","recent","more"].forEach(id=>{
document.getElementById(id).style.display="none"
})
document.getElementById(p).style.display="block"

if(p=="fav") showFav()
if(p=="recent") showRecent()
}

/* FILE */
function openFile(n,u){
rec.unshift({n,u})
localStorage.setItem("rec",JSON.stringify(rec))
window.open(u)
}

/* FAV */
function fav(u,e){
e.stopPropagation()
if(favs.includes(u)) favs=favs.filter(x=>x!=u)
else favs.push(u)
localStorage.setItem("favs",JSON.stringify(favs))
}
function showFav(){
let box=document.getElementById("fav")
box.innerHTML=""
data.subjects.forEach(s=>s.files?.forEach(f=>{
if(favs.includes(f.url)){
box.innerHTML+=`<div class="item">${f.name}</div>`
}
}))
}

/* RECENT */
function showRecent(){
let box=document.getElementById("recent")
box.innerHTML=""
rec.forEach(r=>{
box.innerHTML+=`<div class="item">${r.n}</div>`
})
}

/* SEARCH */
function search(q){
nav("more")
let box=document.getElementById("more")
box.innerHTML=""
data.subjects.forEach(s=>s.files?.forEach(f=>{
if(f.name.toLowerCase().includes(q.toLowerCase())){
box.innerHTML+=`<div class="item">${f.name}</div>`
}
}))
}

/* ADMIN */
function openAdmin(){
let p=prompt("كلمة السر")
if(p=="2004@@##mklL") document.getElementById("admin").style.display="block"
}
function closeAdmin(){document.getElementById("admin").style.display="none"}

function addSub(){
let n=document.getElementById("sub").value
data.subjects.push({name:n,files:[]})
save();render()
}
function addFile(){
let n=document.getElementById("file").value
let u=document.getElementById("url").value
data.subjects[0].files.push({name:n,url:u})
save();render()
}
function updateApp(){
data.config.title=document.getElementById("newTitle").value
data.config.logo=document.getElementById("newLogo").value
save();render()
}

/* UI */
function toggleSide(){
document.getElementById("sidebar").classList.toggle("active")
}
function toggleDark(){
document.body.classList.toggle("dark")
}

load()
</script>

</body>
</html>
