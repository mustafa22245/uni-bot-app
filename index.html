<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المساعد الأكاديمي v20 🎓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F4F8; --card: #FFFFFF; --text: #1E293B; --primary: #4D95FF;
            --border: #E2E8F0; --gray: #94A3B8;
        }
        body.dark {
            --bg: #0F172A; --card: #1E293B; --text: #F8FAFC; --primary: #38BDF8;
            --border: #334155;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }

        /* تسجيل الدخول */
        #login-page { position: fixed; inset: 0; background: #fff; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .input-field { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid var(--border); font-family: 'Cairo'; background: #f8fafc; }
        .btn-action { width: 100%; padding: 16px; background: var(--primary); color: #fff; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(77, 149, 255, 0.3); }

        /* القائمة الجانبية */
        .sidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 310px; height: 100%; background: var(--card); z-index: 2000; transition: 0.4s ease; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .side-head { text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        .side-pfp { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }

        .app-header { background: linear-gradient(180deg, #A4CDFF 0%, #F0F4F8 100%); padding: 50px 20px 30px; text-align: center; position: relative; }
        .menu-icon { position: absolute; right: 20px; top: 25px; font-size: 24px; cursor: pointer; }

        /* الصفحات */
        .page { display: none; padding: 20px 20px 120px; animation: fadeIn 0.4s ease; min-height: 100vh; }
        .page.active { display: block; }

        /* الشات الحقيقي */
        .chat-wrap { height: 60vh; background: var(--card); border-radius: 25px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        #chat-stream { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-box { display: flex; align-items: flex-end; gap: 10px; max-width: 85%; }
        .msg-box.me { align-self: flex-start; }
        .msg-box.other { align-self: flex-end; flex-direction: row-reverse; }
        .msg-txt { padding: 10px 14px; border-radius: 18px; font-size: 13px; line-height: 1.5; cursor: pointer; }
        .me .msg-txt { background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .other .msg-txt { background: #E2E8F0; color: #333; border-bottom-left-radius: 2px; }

        /* البحث عن مستخدمين */
        .user-card { background: var(--card); border-radius: 15px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-pfp-sm { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        /* الشريط السفلي */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { text-align: center; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--primary); font-weight: 700; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(4px); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-page">
        <div style="width: 80px; height: 80px; background: #eee; border-radius: 50%; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center;"><i class="fas fa-user-graduate" style="font-size: 40px; color: #4D95FF;"></i></div>
        <h2>مرحباً بك يا بطل 🎓</h2>
        <p style="color: gray; margin-bottom: 20px;">أنشئ حسابك ليربطك بجميع الطلاب</p>
        <input type="text" id="r-user" class="input-field" placeholder="اسم المستخدم (مثال: mostafa_1)">
        <input type="text" id="r-name" class="input-field" placeholder="اسمك الكامل">
        <input type="text" id="r-uni" class="input-field" placeholder="الجامعة / الكلية">
        <button class="btn-action" onclick="createAccount()">بدء التواصل والدراسة 🚀</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="sidebar">
        <div class="side-head">
            <img id="my-pfp-side" src="https://i.ibb.co/VvzKXY7/bot-avatar.png" class="side-pfp">
            <h3 id="my-name-side" style="margin: 10px 0 0;">مصطفى</h3>
            <span id="my-user-side" style="color: var(--primary); font-size: 12px; font-weight: bold;">@username</span>
        </div>
        <div style="margin-top:10px;">
            <div onclick="nav('edit')" style="padding:15px; cursor:pointer; font-weight:600;"><i class="fas fa-user-edit" style="color:var(--primary); margin-left:10px;"></i> تعديل البروفايل</div>
            <div onclick="toggleDark()" style="padding:15px; cursor:pointer; font-weight:600;"><i class="fas fa-moon" style="color:var(--primary); margin-left:10px;"></i> الوضع الليلي</div>
            <div onclick="window.open('https://t.me/M3y4_p')" style="padding:15px; cursor:pointer; font-weight:600;"><i class="fas fa-paper-plane" style="color:var(--primary); margin-left:10px;"></i> تليجرام المطور</div>
            <div onclick="localStorage.clear(); location.reload();" style="padding:15px; color:red; cursor:pointer; font-weight:600;"><i class="fas fa-sign-out-alt" style="margin-left:10px;"></i> تسجيل الخروج</div>
        </div>
    </div>

    <div id="home-page" class="page active" style="padding:0;">
        <div class="app-header">
            <i class="fas fa-bars menu-icon" onclick="toggleSidebar()"></i>
            <div style="width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);"><i class="fas fa-graduation-cap" style="font-size: 40px; color: #4D95FF;"></i></div>
            <h2 id="greet">مرحباً بك</h2>
        </div>
        <div style="padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            <div onclick="nav('chat')" style="background: white; padding: 20px 10px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02);"><i class="fas fa-comments" style="color: #a855f7; font-size: 24px;"></i><br><small>شات عام</small></div>
            <div onclick="nav('social')" style="background: white; padding: 20px 10px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02);"><i class="fas fa-user-plus" style="color: #2ecc71; font-size: 24px;"></i><br><small>بحث</small></div>
            <div onclick="nav('subjects')" style="background: white; padding: 20px 10px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02);"><i class="fas fa-book" style="color: #4D95FF; font-size: 24px;"></i><br><small>المواد</small></div>
        </div>
    </div>

    <div id="chat-page" class="page">
        <h2 style="margin: 0 0 10px;">💬 شات مباشر (Firebase)</h2>
        <div class="chat-wrap">
            <div id="chat-stream"></div>
            <div style="display:flex; padding:12px; background:#f1f5f9; gap:10px;">
                <input type="text" id="chat-in" class="input-field" style="margin:0;" placeholder="اكتب رسالة...">
                <button onclick="send()" style="background:var(--primary); color:white; border:none; padding:0 20px; border-radius:12px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="social-page" class="page">
        <h2>🔍 البحث عن مستخدمين</h2>
        <input type="text" class="input-field" id="user-find" placeholder="ابحث بالاسم أو اليوزر..." oninput="findOthers()">
        <div id="search-results-box" style="margin-top: 15px;"></div>
    </div>

    <div id="subjects-page" class="page">
        <h2 style="margin-bottom: 15px;">📂 مواد الفاينل</h2>
        <div id="materials-list"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="nav('home')"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-item" onclick="nav('chat')"><i class="fas fa-comment-dots"></i><span>شات</span></div>
        <div class="nav-item" onclick="nav('social')"><i class="fas fa-users"></i><span>أصدقاء</span></div>
        <div class="nav-item" onclick="toggleSidebar()"><i class="fas fa-bars"></i><span>المزيد</span></div>
    </div>

    <script>
        const FB = "https://hillah-app-default-rtdb.firebaseio.com/";
        let me = JSON.parse(localStorage.getItem('userProfile'));
        let lastCount = 0;

        window.onload = () => {
            if(!me) { document.getElementById('login-page').style.display = 'flex'; }
            else { 
                init(); 
                setInterval(sync, 1500); // مزامنة حقيقية كل ثانية ونصف
            }
        };

        async function createAccount() {
            const user = document.getElementById('r-user').value.toLowerCase().trim();
            const name = document.getElementById('r-name').value.trim();
            const uni = document.getElementById('r-uni').value.trim();
            if(user && name) {
                me = { id: Date.now(), username: user, name: name, university: uni, pfp: 'https://i.ibb.co/VvzKXY7/bot-avatar.png' };
                localStorage.setItem('userProfile', JSON.stringify(me));
                // الحفظ في قاعدة البيانات السحابية (فوري)
                await fetch(FB + "users/" + me.id + ".json", { method: 'PUT', body: JSON.stringify(me) });
                location.reload();
            }
        }

        function init() {
            document.getElementById('greet').innerText = "مرحباً، " + me.name;
            document.getElementById('my-name-side').innerText = me.name;
            document.getElementById('my-user-side').innerText = "@" + me.username;
            document.getElementById('my-pfp-side').src = me.pfp;
            loadMaterials();
        }

        // إرسال ومزامنة الشات من Firebase
        async function send() {
            const input = document.getElementById('chat-in');
            if(!input.value.trim()) return;
            const msg = { uid: me.id, name: me.name, pfp: me.pfp, text: input.value.trim(), time: Date.now() };
            input.value = "";
            await fetch(FB + "global_chat.json", { method: 'POST', body: JSON.stringify(msg) });
            sync();
        }

        async function sync() {
            try {
                const res = await fetch(FB + "global_chat.json");
                const data = await res.json();
                if(!data) return;
                const entries = Object.entries(data).sort((a,b)=>a[1].time - b[1].time);
                if(entries.length === lastCount) return;

                const stream = document.getElementById('chat-stream');
                const newItems = entries.slice(lastCount);
                newItems.forEach(([id, m]) => {
                    const isMe = m.uid === me.id ? 'me' : 'other';
                    stream.innerHTML += `
                        <div class="msg-box ${isMe}">
                            <img src="${m.pfp}" style="width:30px; height:30px; border-radius:50%;">
                            <div class="msg-txt"><b>${m.name}:</b><br>${m.text}</div>
                        </div>`;
                });
                stream.scrollTop = stream.scrollHeight;
                lastCount = entries.length;
            } catch(e) {}
        }

        // بحث حقيقي عن المستخدمين في السحابة
        async function findOthers() {
            const q = document.getElementById('user-find').value.toLowerCase().trim();
            const box = document.getElementById('search-results-box');
            if(q.length < 1) { box.innerHTML = ""; return; }
            
            const res = await fetch(FB + "users.json");
            const all = await res.json();
            box.innerHTML = "";
            for(let id in all) {
                const u = all[id];
                if(u.username.includes(q) || u.name.toLowerCase().includes(q)) {
                    box.innerHTML += `
                        <div class="user-card">
                            <div class="user-info">
                                <img src="${u.pfp}" class="user-pfp-sm">
                                <div><b>${u.name}</b><br><small>@${u.username}</small></div>
                            </div>
                            <button onclick="addF('${u.id}')" style="background:var(--primary); color:white; border:none; padding:5px 12px; border-radius:8px; font-size:11px;">إضافة صديق</button>
                        </div>`;
                }
            }
        }

        async function addF(targetId) {
            // نظام طلبات صداقة حقيقي في Firebase
            const request = { fromId: me.id, fromName: me.name, status: 'pending' };
            await fetch(FB + "friend_requests/" + targetId + "/" + me.id + ".json", { method: 'PUT', body: JSON.stringify(request) });
            alert("تم إرسال طلب الصداقة بنجاح! سيصل للمستخدم الآخر في السحابة.");
        }

        function loadMaterials() {
            const list = document.getElementById('materials-list');
            const data = [{ name: "ملزمة النحو", url: "https://drive.google.com/file/d/1Vl9sP1Lh5oRS6Wrg-F5gJ9s7OQCRNIpl/view" }];
            list.innerHTML = "";
            data.forEach(f => {
                list.innerHTML += `<div style="background:white; padding:15px; border-radius:15px; display:flex; justify-content:space-between; margin-top:10px; border:1px solid #eee;">
                    <div onclick="window.open('${f.url}','_blank')"><b>📂 ${f.name}</b></div>
                    <i class="fas fa-heart" style="color:#ddd;"></i>
                </div>`;
            });
        }

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById(p + '-page').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            toggleSidebar(true);
        }

        function toggleSidebar(c=false) {
            const s = document.getElementById('sidebar'), o = document.getElementById('overlay');
            if(c) { s.classList.remove('active'); o.style.display="none"; return; }
            s.classList.toggle('active'); o.style.display = s.classList.contains('active')?"block":"none";
        }
        function toggleDark() { document.body.classList.toggle('dark'); }
    </script>
</body>
</html>
